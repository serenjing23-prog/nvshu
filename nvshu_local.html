<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>女书 · 本地测试版</title>
  <script>
    // Buffer polyfill
    if (typeof Buffer === 'undefined') {
      class Buffer {
        static from(arr) {
          if (typeof arr === 'string') return new TextEncoder().encode(arr);
          if (arr instanceof Uint8Array) return arr;
          return new Uint8Array(arr);
        }
      }
      window.Buffer = Buffer;
    }
  </script>
  <script src="https://unpkg.com/@solana/web3.js@1.95.0/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "楷体", "KaiTi", "Noto Serif SC", "微软雅黑", sans-serif;
      background-color: #faf5ef; 
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(245,225,220,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(235,215,210,0.2) 0%, transparent 50%),
        linear-gradient(45deg, rgba(230,210,200,0.08) 25%, transparent 25%, transparent 75%, rgba(230,210,200,0.08) 75%),
        linear-gradient(45deg, rgba(230,210,200,0.08) 25%, transparent 25%, transparent 75%, rgba(230,210,200,0.08) 75%);
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
      background-position: 0 0, 0 0, 0 0, 30px 30px;
      background-attachment: fixed;
      color: #4a3b3c; 
      padding: 30px 20px;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container { 
      width: 100%; max-width: 720px; 
      background: rgba(255,255,255,0.9); 
      backdrop-filter: blur(8px);
      border-radius: 32px; padding: 40px 32px; 
      box-shadow: 0 8px 32px rgba(180,100,100,0.12);
      border: 1px solid #f0e0e0;
    }
    h1 { 
      text-align: center; font-size: 2.6em; margin:0; 
      color: #b8404c; letter-spacing: 6px;
      position: relative; font-weight: 500;
    }
    h1::before, h1::after {
      content: "𛆉"; font-size: 0.6em; color: #c77d7d; opacity: 0.7;
    }
    h1::after { content: "𛆊"; }
    .title { 
      text-align: center; font-size: 1em; color: #a05a60; 
      margin-bottom: 36px; padding: 12px 0;
      border-top: 1px dashed #e2c8c8; border-bottom: 1px dashed #e2c8c8;
      letter-spacing: 2px;
    }
    .section { 
      background: #ffffff; border-radius: 20px; padding: 24px; 
      margin-bottom: 24px; border: 1px solid #f5e8e8;
      box-shadow: 0 4px 12px rgba(160,80,80,0.06);
    }
    .section h2 { 
      font-size: 1.15em; color: #b8404c; margin-bottom: 18px;
      padding-bottom: 8px; border-bottom: 1px solid #f5e8e8;
      font-weight: 500; letter-spacing: 1px;
    }
    label { 
      font-weight: 500; display: block; margin-top: 12px; 
      margin-bottom: 4px; font-size: 0.85em; color: #6d5a5c;
    }
    input, textarea, select { 
      width: 100%; padding: 12px 14px; margin-bottom: 12px; 
      border: 1px solid #e8d0d0; border-radius: 14px; 
      font-size: 0.95em; background: #fefcfc;
    }
    button { 
      background: #b8404c; color: white; border: none; 
      padding: 12px 24px; border-radius: 24px; cursor: pointer; 
      font-size: 0.9em; font-weight: 500; margin: 6px 6px 6px 0;
      box-shadow: 0 4px 10px rgba(184,64,76,0.2);
    }
    button:hover { background: #9c3540; }
    .wallet-address { font-family: monospace; font-size: 0.85em; word-break: break-all; }
    .status-badge { 
      display: inline-block; padding: 6px 14px; border-radius: 20px; 
      background: #f8e8e8; color: #b8404c;
    }
    .contract-card { 
      background: #ffffff; border: 1px solid #f0e0e0; 
      border-radius: 16px; padding: 20px; margin-top: 12px;
    }
    hr { border: 0; border-top: 1px solid #f0e0e0; margin: 28px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="title">“婚姻”即议定协议 | 链上合约工具 · 本地测试版</div>

    <!-- 钱包模块 -->
    <div class="section">
      <h2>👛 钱包管理</h2>
      <button id="createWalletsBtn">✨ 生成两个测试钱包</button>
      <button id="connectBrowserWalletBtn" style="display:none;">🔗 连接浏览器钱包</button>
      <button id="disconnectBrowserWalletBtn" style="display:none; background:#888;">断开钱包</button>
      <div id="testWalletsContainer" style="display:none;">
        <h3>🧪 测试钱包 (本地网络)</h3>
        <div id="walletACard" class="wallet-card active-wallet" style="background:#fefafa; border:1px solid #f0e0e0; border-radius:16px; padding:16px; margin:12px 0; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>发起人 (你)</strong><br>
            <span id="walletAAddress" class="wallet-address"></span><br>
            <span id="walletABalance">余额: -</span>
          </div>
          <div>
            <input type="radio" name="activeWallet" value="A" checked onchange="switchActiveWallet('A')"> 使用此钱包
          </div>
        </div>
        <div id="walletBCard" class="wallet-card" style="background:#fefafa; border:1px solid #f0e0e0; border-radius:16px; padding:16px; margin:12px 0; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>签署人 (伙伴)</strong><br>
            <span id="walletBAddress" class="wallet-address"></span><br>
            <span id="walletBBalance">余额: -</span>
          </div>
          <div>
            <input type="radio" name="activeWallet" value="B" onchange="switchActiveWallet('B')"> 使用此钱包
          </div>
        </div>
      </div>
      <div id="browserWalletContainer" style="display:none;">
        <h3>🌐 浏览器钱包</h3>
        <div id="browserWalletCard" class="wallet-card" style="background:#fefafa; border:1px solid #f0e0e0; border-radius:16px; padding:16px; margin:12px 0; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>已连接</strong><br>
            <span id="browserWalletAddress" class="wallet-address"></span>
          </div>
          <div>
            <input type="radio" name="activeWallet" value="browser" onchange="switchActiveWallet('browser')"> 使用此钱包
          </div>
        </div>
      </div>
      <p id="walletStatus" style="font-size:0.9em; color:#888; margin-top:10px;">未连接</p>
    </div>

    <!-- 创建合约模块 -->
    <div class="section">
      <h2>✍️ 创建新合约</h2>
      <label>协议类型</label>
      <select id="contractType">
        <option value="婚姻议定">“婚姻”议定</option>
        <option value="意定监护协议">意定监护协议</option>
        <option value="养老互助协议">养老互助协议</option>
        <option value="自定义协议">自定义协议</option>
      </select>
      <label>参与者信息 (每行一人)</label>
      <div id="participantsContainer">
        <div class="participant-row" style="display:flex; gap:8px; margin-bottom:8px;">
          <input type="text" class="participant-address" placeholder="公钥地址" style="flex:2;">
          <select class="participant-gender" style="flex:1.3;">
            <option value="Female">女性</option>
            <option value="Male">男性</option>
            <option value="NonBinary">非二元性别</option>
            <option value="Agender">无性别</option>
            <option value="TwoSpirit">双灵</option>
            <option value="PreferNotToSay">不愿透露</option>
          </select>
          <button type="button" class="remove-participant-btn" style="display:none; background:#888; flex:0.6;">移除</button>
        </div>
      </div>
      <button id="addParticipantBtn" style="background:#6a1b9a;">➕ 添加参与者</button>

      <label style="margin-top:16px;">开始日期 (可选)</label>
      <input type="date" id="createStartDate">
      <label>结束日期 (必填)</label>
      <input type="date" id="createEndDate">
      <p id="dateHint" style="font-size:0.85em; color:#888; margin-top:5px;"></p>

      <label>合约内容</label>
      <input type="text" id="createText" placeholder="例如：我们互相守护，约定未来三年共同居住">
      <button id="createBtn">✨ 创建合约</button>
      <div id="createResult" style="font-size:0.9em; margin-top:8px;"></div>
    </div>

    <!-- 签署与查询模块 -->
    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <label>合约地址</label>
      <input type="text" id="signContractAddr" placeholder="输入已有合约的公钥地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult" style="font-size:0.9em; margin-top:8px;"></div>
    </div>

    <div class="section">
      <h2>🔍 查询合约</h2>
      <label>合约地址</label>
      <input type="text" id="queryContractAddr" placeholder="输入合约公钥地址">
      <button id="queryBtn">查询合约详情</button>
      <div id="queryResult" style="font-size:0.9em; margin-top:8px;"></div>
    </div>

    <!-- AI 模块 -->
    <div class="section">
      <h2>🧠 AI 法律顾问</h2>
      <label>法律管辖区</label>
      <select id="lawJurisdiction">
        <option value="china">中国民法</option>
        <option value="california">美国加州家庭法</option>
        <option value="europe">欧洲（通用）</option>
        <option value="custom">其他（自定义）</option>
      </select>
      <div id="customLawBox" style="display:none;">
        <label>自定义法律背景描述</label>
        <input type="text" id="customLawContext" placeholder="例如：根据伊斯兰教法...">
      </div>
      <label>输入你的合约条款</label>
      <textarea id="aiContractText" rows="3" placeholder="描述你们的约定..."></textarea>
      <label>你的 DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
      <button id="aiAnalyzeBtn">🔍 分析法律风险</button>
      <div id="aiResult" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    const PROGRAM_ID = new solanaWeb3.PublicKey("FuCn9zJcTa3Agq3vAVwknTiJR62Y66bDmPX4GhMMwNSo");
    let connection = new solanaWeb3.Connection("http://localhost:8899", "confirmed");
    let testWalletA = null, testWalletB = null, browserSigner = null, browserPublicKey = null;
    let activePublicKey = null, activeSigner = null, activeWalletType = 'A';

    function init() {
      if (window.solana) document.getElementById('connectBrowserWalletBtn').style.display = 'inline-block';
      updateRemoveButtons();
    }

    // ----- 钱包生成 -----
    document.getElementById('createWalletsBtn').addEventListener('click', async () => {
      testWalletA = solanaWeb3.Keypair.generate();
      testWalletB = solanaWeb3.Keypair.generate();
      for (const w of [testWalletA, testWalletB]) {
        const sig = await connection.requestAirdrop(w.publicKey, 10_000_000_000);
        await connection.confirmTransaction(sig);
      }
      document.getElementById('walletAAddress').innerText = testWalletA.publicKey.toString();
      document.getElementById('walletBAddress').innerText = testWalletB.publicKey.toString();
      updateTestBalances();
      document.getElementById('testWalletsContainer').style.display = 'block';
      setActiveWallet(testWalletA, testWalletA.publicKey, 'A');
      document.querySelector('.participant-address').placeholder = testWalletA.publicKey.toString();
    });

    // ----- 连接浏览器钱包 -----
    document.getElementById('connectBrowserWalletBtn').addEventListener('click', async () => {
      if (!window.solana) return alert('请安装 Solana 钱包扩展');
      try {
        const resp = await window.solana.connect();
        browserPublicKey = resp.publicKey;
        browserSigner = window.solana;
        document.getElementById('browserWalletAddress').innerText = browserPublicKey.toString();
        document.getElementById('browserWalletContainer').style.display = 'block';
        document.getElementById('connectBrowserWalletBtn').style.display = 'none';
        document.getElementById('disconnectBrowserWalletBtn').style.display = 'inline-block';
        setActiveWallet(browserSigner, browserPublicKey, 'browser');
        document.querySelector('.participant-address').placeholder = browserPublicKey.toString();
      } catch(e) { alert('连接失败: ' + e.message); }
    });

    document.getElementById('disconnectBrowserWalletBtn').addEventListener('click', async () => {
      if (browserSigner && browserSigner.disconnect) await browserSigner.disconnect();
      browserSigner = null; browserPublicKey = null;
      document.getElementById('browserWalletContainer').style.display = 'none';
      document.getElementById('connectBrowserWalletBtn').style.display = 'inline-block';
      document.getElementById('disconnectBrowserWalletBtn').style.display = 'none';
      if (activeWalletType === 'browser' && testWalletA) setActiveWallet(testWalletA, testWalletA.publicKey, 'A');
    });

    function switchActiveWallet(type) {
      if (type === 'A' && testWalletA) setActiveWallet(testWalletA, testWalletA.publicKey, 'A');
      else if (type === 'B' && testWalletB) setActiveWallet(testWalletB, testWalletB.publicKey, 'B');
      else if (type === 'browser' && browserSigner) setActiveWallet(browserSigner, browserPublicKey, 'browser');
    }

    function setActiveWallet(signer, publicKey, type) {
      activeWalletType = type; activeSigner = signer; activePublicKey = publicKey;
      document.querySelectorAll('.wallet-card').forEach(c => c.classList.remove('active-wallet'));
      if (type === 'A') document.getElementById('walletACard').classList.add('active-wallet');
      else if (type === 'B') document.getElementById('walletBCard').classList.add('active-wallet');
      else if (type === 'browser') document.getElementById('browserWalletCard').classList.add('active-wallet');
      document.querySelector('.participant-address').placeholder = publicKey.toString();
      updateProvider();
    }

    function updateProvider() {
      if (!activeSigner) return;
      const wallet = {
        publicKey: activePublicKey,
        signTransaction: async (tx) => {
          if (activeWalletType === 'browser') return await activeSigner.signTransaction(tx);
          tx.partialSign(activeSigner);
          return tx;
        },
        signAllTransactions: async (txs) => {
          if (activeWalletType === 'browser') return await activeSigner.signAllTransactions(txs);
          return txs.map(tx => { tx.partialSign(activeSigner); return tx; });
        }
      };
      provider = new anchor.AnchorProvider(connection, wallet, {});
      anchor.setProvider(provider);
      program = new anchor.Program(IDL, PROGRAM_ID, provider);
    }

    // IDL 将在外部嵌入
    const IDL = {"version": "0.1.0", "name": "nvshu", "instructions": [{"name": "createContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": true}, {"name": "creator", "isMut": true, "isSigner": true}, {"name": "systemProgram", "isMut": false, "isSigner": false}], "args": [{"name": "participantWallets", "type": {"vec": "publicKey"}}, {"name": "genders", "type": {"vec": {"defined": "Gender"}}}, {"name": "contractText", "type": "string"}, {"name": "durationDays", "type": "i64"}]}, {"name": "signContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "signer", "isMut": false, "isSigner": true}], "args": []}, {"name": "annulContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "authority", "isMut": false, "isSigner": true}], "args": []}], "accounts": [{"name": "MarriageContract", "type": {"kind": "struct", "fields": [{"name": "creator", "type": "publicKey"}, {"name": "participants", "type": {"vec": {"defined": "Participant"}}}, {"name": "contractText", "type": "string"}, {"name": "createdAt", "type": "i64"}, {"name": "expiresAt", "type": "i64"}, {"name": "status", "type": {"defined": "ContractStatus"}}]}}], "types": [{"name": "Participant", "type": {"kind": "struct", "fields": [{"name": "wallet", "type": "publicKey"}, {"name": "gender", "type": {"defined": "Gender"}}, {"name": "signed", "type": "bool"}]}}, {"name": "Gender", "type": {"kind": "enum", "variants": [{"name": "Female"}, {"name": "Male"}, {"name": "Other"}]}}, {"name": "ContractStatus", "type": {"kind": "enum", "variants": [{"name": "Pending"}, {"name": "Active"}, {"name": "Expired"}, {"name": "Annulled"}]}}], "errors": [{"code": 6000, "name": "NotAParticipant", "msg": "You are not a participant of this contract."}, {"code": 6001, "name": "AlreadySigned", "msg": "You have already signed this contract."}, {"code": 6002, "name": "NotActive", "msg": "Contract is not active."}]};

    async function updateTestBalances() {
      if (testWalletA) {
        const bal = await connection.getBalance(testWalletA.publicKey);
        document.getElementById('walletABalance').innerText = `余额: ${bal / 1e9} SOL`;
      }
      if (testWalletB) {
        const bal = await connection.getBalance(testWalletB.publicKey);
        document.getElementById('walletBBalance').innerText = `余额: ${bal / 1e9} SOL`;
      }
    }

    // ----- 参与者动态行 -----
    function updateRemoveButtons() {
      const rows = document.querySelectorAll('.participant-row');
      rows.forEach(r => {
        const btn = r.querySelector('.remove-participant-btn');
        if (btn) btn.style.display = rows.length > 1 ? 'inline-block' : 'none';
      });
    }
    document.getElementById('addParticipantBtn').addEventListener('click', () => {
      const container = document.getElementById('participantsContainer');
      const row = document.createElement('div');
      row.className = 'participant-row';
      row.style.cssText = 'display:flex; gap:8px; margin-bottom:8px;';
      row.innerHTML = `
        <input type="text" class="participant-address" placeholder="公钥地址" style="flex:2;">
        <select class="participant-gender" style="flex:1.3;">
          <option value="Female">女性</option><option value="Male">男性</option><option value="NonBinary">非二元性别</option>
          <option value="Agender">无性别</option><option value="TwoSpirit">双灵</option><option value="PreferNotToSay">不愿透露</option>
        </select>
        <button type="button" class="remove-participant-btn" style="background:#888; flex:0.6;">移除</button>
      `;
      container.appendChild(row);
      updateRemoveButtons();
      row.querySelector('.remove-participant-btn').addEventListener('click', function() {
        row.remove(); updateRemoveButtons();
      });
    });

    // 日期提示
    document.getElementById('createEndDate').addEventListener('change', function() {
      const s = document.getElementById('createStartDate').value, e = this.value;
      if (s && e) {
        const days = Math.round((new Date(e+'T00:00:00Z') - new Date(s+'T00:00:00Z')) / 86400000);
        document.getElementById('dateHint').innerText = days > 0 ? `有效期约 ${days} 天` : '结束日期必须晚于开始日期';
      }
    });

    // 协议前缀
    document.getElementById('contractType').addEventListener('change', function() {
      const prefix = `[${this.value}] `;
      const inp = document.getElementById('createText');
      if (!inp.value.startsWith('[')) inp.value = prefix + inp.value.replace(/^\[.*?\]\s*/, '');
    });

    // ----- 交易构造（与公开版相同）-----
    async function sendTransaction(instruction, signers = []) {
      if (!activePublicKey) throw new Error('钱包未连接');
      let tx = new solanaWeb3.Transaction().add(instruction);
      const { blockhash } = await connection.getLatestBlockhash();
      tx.recentBlockhash = blockhash;
      tx.feePayer = activePublicKey;
      signers.forEach(signer => tx.partialSign(signer));
      if (activeWalletType === 'browser') {
        const signed = await activeSigner.signTransaction(tx);
        return await connection.sendRawTransaction(signed.serialize());
      } else {
        tx.sign(...signers);
        return await connection.sendRawTransaction(tx.serialize());
      }
    }

    function buildCreateInstruction(contractAccount, creator, participants, genders, text, duration) {
      const buf = [0]; // instruction index 0
      buf.push(participants.length & 0xff, (participants.length>>8)&0xff, (participants.length>>16)&0xff, (participants.length>>24)&0xff);
      participants.forEach(p => { const b = p.toBytes(); for(let i=0;i<32;i++) buf.push(b[i]); });
      buf.push(participants.length & 0xff, (participants.length>>8)&0xff, (participants.length>>16)&0xff, (participants.length>>24)&0xff);
      const gMap = { Female:0, Male:1, Other:2 };
      genders.forEach(g => buf.push(gMap[Object.keys(g)[0]] ?? 2));
      const enc = new TextEncoder(); const sb = enc.encode(text);
      buf.push(sb.length & 0xff, (sb.length>>8)&0xff, (sb.length>>16)&0xff, (sb.length>>24)&0xff);
      for(let v of sb) buf.push(v);
      const dv = new DataView(new ArrayBuffer(8)); dv.setBigInt64(0, BigInt(duration), true);
      for(let i=0;i<8;i++) buf.push(dv.getUint8(i));
      const data = new Uint8Array(buf);
      return new solanaWeb3.TransactionInstruction({
        keys: [
          {pubkey: contractAccount, isSigner: true, isWritable: true},
          {pubkey: creator, isSigner: true, isWritable: true},
          {pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false}
        ],
        programId: PROGRAM_ID,
        data
      });
    }

    function buildSignInstruction(contract, signer) {
      return new solanaWeb3.TransactionInstruction({
        keys: [
          {pubkey: contract, isSigner: false, isWritable: true},
          {pubkey: signer, isSigner: true, isWritable: false}
        ],
        programId: PROGRAM_ID,
        data: new Uint8Array([1])
      });
    }

    // 创建合约
    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!activePublicKey) return alert('请先生成或连接钱包');
      const addrInputs = document.querySelectorAll('.participant-address');
      const genderInputs = document.querySelectorAll('.participant-gender');
      const participants = [], genders = [];
      for (let i=0; i<addrInputs.length; i++) {
        const addrStr = addrInputs[i].value.trim();
        participants.push(addrStr ? new solanaWeb3.PublicKey(addrStr) : activePublicKey);
        const gv = genderInputs[i].value;
        if (gv === 'Female') genders.push({Female:{}});
        else if (gv === 'Male') genders.push({Male:{}});
        else genders.push({Other:{}});
      }
      const endVal = document.getElementById('createEndDate').value;
      if (!endVal) return alert('请选择结束日期');
      const end = new Date(endVal+'T00:00:00Z'), startVal = document.getElementById('createStartDate').value;
      const start = startVal ? new Date(startVal+'T00:00:00Z') : new Date();
      const days = Math.round((end-start)/86400000);
      if (days<1) return alert('结束日期必须晚于开始日期');
      let text = document.getElementById('createText').value;
      const prefix = `[${document.getElementById('contractType').value}] `;
      if (!text.startsWith('[')) text = prefix + text;
      const contractKP = solanaWeb3.Keypair.generate();
      try {
        const txid = await sendTransaction(
          buildCreateInstruction(contractKP.publicKey, activePublicKey, participants, genders, text, days),
          [contractKP]
        );
        await connection.confirmTransaction(txid);
        document.getElementById('createResult').innerHTML = `✅ 合约已创建！<br><strong>${contractKP.publicKey.toString()}</strong>`;
        if (activeWalletType !== 'browser') updateTestBalances();
      } catch(e) {
        document.getElementById('createResult').innerHTML = `❌ ${e.message}`;
        console.error(e);
      }
    });

    // 签署合约
    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!activePublicKey) return alert('请先生成或连接钱包');
      const addr = document.getElementById('signContractAddr').value;
      if (!addr) return alert('请输入合约地址');
      try {
        const txid = await sendTransaction(buildSignInstruction(new solanaWeb3.PublicKey(addr), activePublicKey));
        await connection.confirmTransaction(txid);
        document.getElementById('signResult').innerHTML = '✅ 签署成功';
      } catch(e) {
        document.getElementById('signResult').innerHTML = `❌ ${e.message}`;
      }
    });

    // 查询合约（简化解析）
    document.getElementById('queryBtn').addEventListener('click', async () => {
      const addr = document.getElementById('queryContractAddr').value;
      if (!addr) return;
      try {
        const info = await connection.getAccountInfo(new solanaWeb3.PublicKey(addr));
        if (!info) throw new Error('账户不存在');
        const d = info.data;
        const creator = new solanaWeb3.PublicKey(d.slice(8,40));
        let off=40; const plen = d.readUInt32LE(off); off+=4;
        const plist = [];
        for(let i=0;i<plen;i++) {
          const w = new solanaWeb3.PublicKey(d.slice(off,off+32)); off+=32;
          const gen = d.readUInt8(off); off+=1;
          const sig = d.readUInt8(off)===1; off+=1;
          plist.push({wallet:w.toString(), gender:['Female','Male','Other'][gen]||'Other', signed:sig});
        }
        const tlen = d.readUInt32LE(off); off+=4;
        const text = new TextDecoder().decode(d.slice(off,off+tlen)); off+=tlen;
        const createdAt = Number(d.readBigInt64LE(off)); off+=8;
        const expiresAt = Number(d.readBigInt64LE(off)); off+=8;
        const status = ['Pending','Active','Expired','Annulled'][d.readUInt8(off)]||'Unknown';
        let html = `<div class="contract-card"><p><strong>发起人：</strong>${creator}</p><p><strong>内容：</strong>${text}</p><p><strong>创建时间：</strong>${new Date(createdAt*1000).toLocaleString()}</p><p><strong>过期时间：</strong>${expiresAt===0?'永久':new Date(expiresAt*1000).toLocaleString()}</p><p><strong>状态：</strong><span class="status-badge">${status}</span></p><ul>`;
        plist.forEach(p => html += `<li>${p.wallet} - ${p.gender} - ${p.signed?'已签':'未签'}</li>`);
        html += '</ul></div>';
        document.getElementById('queryResult').innerHTML = html;
      } catch(e) {
        document.getElementById('queryResult').innerHTML = `❌ ${e.message}`;
      }
    });

    // AI 法律顾问
    document.getElementById('aiAnalyzeBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      if(!apiKey) return alert('请输入 API Key');
      const text = document.getElementById('aiContractText').value.trim();
      const resDiv = document.getElementById('aiResult');
      resDiv.innerHTML = '⏳ 分析中...';
      const j = document.getElementById('lawJurisdiction').value;
      let ctx = '你是一位法律顾问。';
      if(j==='china') ctx = '你是一位精通中国民法典的AI法律顾问。';
      else if(j==='california') ctx = '你是一位精通美国加州家庭法的AI法律顾问。';
      else if(j==='europe') ctx = '你是一位精通欧洲人权公约的AI法律顾问。';
      else if(j==='custom') ctx = document.getElementById('customLawContext').value.trim() || ctx;
      const prompt = `${ctx} 请分析以下协议条款，用中文给出风险提示。`;
      try {
        const resp = await fetch('https://api.deepseek.com/chat/completions', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
          body: JSON.stringify({model:'deepseek-chat', messages:[{role:'system',content:prompt},{role:'user',content:text}], temperature:0.3})
        });
        if(!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        resDiv.innerHTML = `<div style="white-space:pre-wrap;background:#fff;padding:12px;border-radius:8px;">📋 ${data.choices[0].message.content.replace(/\n/g, '<br>')}</div>`;
      } catch(e) { resDiv.innerHTML = `❌ ${e.message}`; }
    });
    document.getElementById('lawJurisdiction').addEventListener('change', function() {
      document.getElementById('customLawBox').style.display = this.value==='custom' ? 'block' : 'none';
    });

    init();
  </script>
</body>
</html>
