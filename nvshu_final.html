<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>女书 · “婚姻”即议定协议 | 链上合约工具</title>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/@project-serum/anchor@latest/dist/browser/index.js"></script>
  <style>
    /* 基础重置与字体 */
    body { 
      font-family: "楷体","KaiTi","微软雅黑",sans-serif; 
      background-color: #faf5ef; 
      color: #5d4037; 
      margin:0; padding:20px; 
      position: relative;
      /* 宣纸纹理背景（CSS 实现） */
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(245,225,220,0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(235,215,210,0.3) 0%, transparent 50%),
        linear-gradient(45deg, rgba(230,210,200,0.1) 25%, transparent 25%, transparent 75%, rgba(230,210,200,0.1) 75%),
        linear-gradient(45deg, rgba(230,210,200,0.1) 25%, transparent 25%, transparent 75%, rgba(230,210,200,0.1) 75%);
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
      background-position: 0 0, 0 0, 0 0, 30px 30px;
      background-attachment: fixed;
    }
    /* 整体容器 */
    .container { 
      max-width: 800px; margin:0 auto; 
      background: rgba(255,255,255,0.85); 
      backdrop-filter: blur(5px);
      border-radius: 20px; padding: 30px; 
      box-shadow: 0 4px 30px rgba(180,100,100,0.15); 
      border: 1px solid #e8d5d0;
      position: relative;
    }
    /* 标题 */
    h1 { 
      text-align: center; font-size: 3em; margin:0; 
      color: #b3444c; 
      letter-spacing: 4px;
      text-shadow: 1px 1px 2px rgba(180, 80, 80, 0.3);
      position: relative;
    }
    h1::before, h1::after {
      content: "𛆉"; 
      font-size: 0.6em;
      color: #c77d7d;
      margin: 0 10px;
      opacity: 0.7;
    }
    h1::after { content: "𛆊"; }
    .title { 
      text-align: center; font-size: 1.2em; margin:10px 0 30px; 
      color: #9e5a5e; 
      border-top: 1px dashed #d4a5a5; 
      border-bottom: 1px dashed #d4a5a5;
      padding: 10px 0;
      letter-spacing: 2px;
    }
    /* 按钮 */
    button { 
      background: #b3444c; color: white; border: none; 
      padding: 10px 20px; border-radius: 8px; cursor: pointer; 
      font-size: 1em; margin: 5px; 
      transition: background 0.3s;
    }
    button:hover { background: #8e3339; }
    /* 输入框与选择框 */
    input, textarea, select { 
      width: 100%; padding: 8px; margin: 5px 0 15px; 
      border: 1px solid #d4a5a5; border-radius: 5px; 
      font-size: 1em; box-sizing: border-box;
      background: rgba(255,255,255,0.6);
    }
    label { font-weight: bold; display: block; margin-top: 10px; }
    /* 卡片模块 */
    .section { 
      margin: 20px 0; padding: 20px; 
      background: rgba(255,245,240,0.7); 
      border-radius: 10px;
      border-left: 4px solid #c77d7d;
      box-shadow: 0 2px 8px rgba(180,100,100,0.1);
    }
    .contract-card { 
      background: white; 
      border: 1px solid #e6c8c8; 
      border-radius: 10px; padding: 15px; margin: 10px 0; 
    }
    hr { border: 0; border-top: 1px solid #e6c8c8; margin: 30px 0; }
    .info { font-size: 0.9em; color: #888; }
    .status-badge { 
      display: inline-block; padding: 4px 12px; border-radius: 12px; 
      background: #f3e0e0; color: #b3444c; 
    }
    .ai-box { 
      background: rgba(245,235,240,0.8); 
      border: 1px solid #ce93d8; border-radius: 12px; padding: 15px; margin-top: 15px; 
    }
    .ai-response { 
      white-space: pre-wrap; background: white; padding: 12px; border-radius: 8px; 
      max-height: 300px; overflow-y: auto; 
    }
    /* 参与者行样式 */
    .participant-row { 
      display: flex; gap: 10px; margin-bottom: 10px; align-items: center; 
    }
    .participant-row input { flex: 2; margin: 0; }
    .participant-row select { flex: 1.5; margin: 0; }
    .participant-row button { flex: 0.5; margin: 0; background: #888; }

    /* 额外装饰：角花纹 */
    .container::before, .container::after {
      content: "";
      position: absolute;
      width: 40px; height: 40px;
      background: radial-gradient(circle, rgba(180,100,100,0.5) 2px, transparent 4px);
      background-size: 10px 10px;
      opacity: 0.5;
    }
    .container::before { top: 10px; left: 10px; }
    .container::after { bottom: 10px; right: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="title">“婚姻”即议定协议 | 链上合约工具</div>

    <!-- 钱包模块（不变） -->
    <div id="walletBox" class="section">
      <button id="createWalletBtn">✨ 生成演示钱包</button>
      <span id="walletStatus" style="margin-left:10px">未连接</span>
      <br><br>
      <div id="balanceInfo"></div>
    </div>

    <!-- 创建合约模块 -->
    <div class="section">
      <h2>✍️ 创建新合约</h2>
      <label>协议类型</label>
      <select id="contractType">
        <option value="婚姻议定">“婚姻”议定</option>
        <option value="意定监护协议">意定监护协议</option>
        <option value="养老互助协议">养老互助协议</option>
        <option value="自定义协议">自定义协议</option>
      </select>
      <label>参与者信息</label>
      <div id="participantsContainer">
        <div class="participant-row">
          <input type="text" class="participant-address" placeholder="参与者公钥地址">
          <select class="participant-gender">
            <option value="Female">女性 (Female)</option>
            <option value="Male">男性 (Male)</option>
            <option value="NonBinary">非二元性别 (Non-binary)</option>
            <option value="Agender">无性别 (Agender)</option>
            <option value="TwoSpirit">双灵 (Two-Spirit)</option>
            <option value="PreferNotToSay">不愿透露</option>
          </select>
          <button type="button" class="remove-participant-btn" style="display:none;">移除</button>
        </div>
      </div>
      <button id="addParticipantBtn" style="background:#6a1b9a;">➕ 添加参与者</button>
      <label>合约内容</label>
      <input type="text" id="createText" placeholder="我们互相守护，约定未来三年共同居住">
      <label>有效期（天，0 表示永久）</label>
      <input type="number" id="createDuration" value="365">
      <button id="createBtn">创建合约</button>
      <div id="createResult"></div>
    </div>

    <!-- 签署与查询（不变） -->
    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <label>合约地址（Public Key）</label>
      <input type="text" id="signContractAddr" placeholder="输入已有合约的公钥地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult"></div>
    </div>
    <div class="section">
      <h2>🔍 查询合约</h2>
      <label>合约地址</label>
      <input type="text" id="queryContractAddr" placeholder="输入合约公钥地址">
      <button id="queryBtn">查询合约详情</button>
      <div id="queryResult"></div>
    </div>

    <!-- AI 顾问（不变） -->
    <div class="section ai-box">
      <h2>🧠 AI 法律顾问（公益版 · 基于 DeepSeek）</h2>
      <p style="margin:5px 0; font-size:0.9em;">⚠️ 本分析仅供参考，不构成法律意见。请咨询专业律师。</p>
      <label>输入你的合约条款</label>
      <textarea id="aiContractText" rows="3" placeholder="描述你们的约定"></textarea>
      <label>你的 DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
      <button id="aiAnalyzeBtn">🔍 分析法律风险</button>
      <div id="aiResult" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    // 与之前完全相同的 JS 代码（性别映射、协议类型、AI 等）
    const PROGRAM_ID = new solanaWeb3.PublicKey("FuCn9zJcTa3Agq3vAVwknTiJR62Y66bDmPX4GhMMwNSo");
    const IDL = {"version": "0.1.0", "name": "nvshu", "instructions": [{"name": "createContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": true}, {"name": "creator", "isMut": true, "isSigner": true}, {"name": "systemProgram", "isMut": false, "isSigner": false}], "args": [{"name": "participantWallets", "type": {"vec": "publicKey"}}, {"name": "genders", "type": {"vec": {"defined": "Gender"}}}, {"name": "contractText", "type": "string"}, {"name": "durationDays", "type": "i64"}]}, {"name": "signContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "signer", "isMut": false, "isSigner": true}], "args": []}, {"name": "annulContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "authority", "isMut": false, "isSigner": true}], "args": []}], "accounts": [{"name": "MarriageContract", "type": {"kind": "struct", "fields": [{"name": "creator", "type": "publicKey"}, {"name": "participants", "type": {"vec": {"defined": "Participant"}}}, {"name": "contractText", "type": "string"}, {"name": "createdAt", "type": "i64"}, {"name": "expiresAt", "type": "i64"}, {"name": "status", "type": {"defined": "ContractStatus"}}]}}], "types": [{"name": "Participant", "type": {"kind": "struct", "fields": [{"name": "wallet", "type": "publicKey"}, {"name": "gender", "type": {"defined": "Gender"}}, {"name": "signed", "type": "bool"}]}}, {"name": "Gender", "type": {"kind": "enum", "variants": [{"name": "Female"}, {"name": "Male"}, {"name": "Other"}]}}, {"name": "ContractStatus", "type": {"kind": "enum", "variants": [{"name": "Pending"}, {"name": "Active"}, {"name": "Expired"}, {"name": "Annulled"}]}}], "errors": [{"code": 6000, "name": "NotAParticipant", "msg": "You are not a participant of this contract."}, {"code": 6001, "name": "AlreadySigned", "msg": "You have already signed this contract."}, {"code": 6002, "name": "NotActive", "msg": "Contract is not active."}]};

    let connection, provider, program, walletKeypair, walletPubkey;
    connection = new solanaWeb3.Connection("http://localhost:8899", "confirmed");

    
  // 日期选择变化提示
  const startInput = document.getElementById('createStartDate');
  const endInput = document.getElementById('createEndDate');
  const hint = document.getElementById('dateHint');
  [startInput, endInput].forEach(el => {
    if(el) el.addEventListener('change', () => {
      if(startInput.value && endInput.value) {
        const start = new Date(startInput.value + "T00:00:00Z");
        const end = new Date(endInput.value + "T00:00:00Z");
        if(end <= start) hint.innerText = "❌ 结束日期必须晚于开始日期";
        else {
          const days = Math.round((end - start) / 86400000);
          hint.innerText = `合约有效期约 ${days} 天`;
        }
      }
    });
  });


  // 日期选择变化提示
  const startInput = document.getElementById('createStartDate');
  const endInput = document.getElementById('createEndDate');
  const hint = document.getElementById('dateHint');
  [startInput, endInput].forEach(el => {
    if(el) el.addEventListener('change', () => {
      if(startInput.value && endInput.value) {
        const start = new Date(startInput.value + "T00:00:00Z");
        const end = new Date(endInput.value + "T00:00:00Z");
        if(end <= start) hint.innerText = "❌ 结束日期必须晚于开始日期";
        else {
          const days = Math.round((end - start) / 86400000);
          hint.innerText = `合约有效期约 ${days} 天`;
        }
      }
    });
  });

document.getElementById('createWalletBtn').addEventListener('click', async () => {
      walletKeypair = solanaWeb3.Keypair.generate();
      walletPubkey = walletKeypair.publicKey;
      document.getElementById('walletStatus').innerText = `已连接: ${walletPubkey.toString().slice(0, 8)}...`;
      try {
        const sig = await connection.requestAirdrop(walletPubkey, 10_000_000_000);
        await connection.confirmTransaction(sig);
        updateBalance();
      } catch(e) { console.error(e); }
      const wallet = {
        publicKey: walletPubkey,
        signTransaction: async (tx) => { tx.partialSign(walletKeypair); return tx; },
        signAllTransactions: async (txs) => txs.map(tx => { tx.partialSign(walletKeypair); return tx; })
      };
      provider = new anchor.AnchorProvider(connection, wallet, anchor.AnchorProvider.defaultOptions());
      anchor.setProvider(provider);
      program = new anchor.Program(IDL, PROGRAM_ID, provider);
      document.querySelector('.participant-address').placeholder = walletPubkey.toString();
    });

    async function updateBalance() {
      if (!walletPubkey) return;
      const bal = await connection.getBalance(walletPubkey);
      document.getElementById('balanceInfo').innerHTML = `💰 余额: ${bal / 1e9} SOL`;
    }

    function updateRemoveButtons() {
      const rows = document.querySelectorAll('.participant-row');
      rows.forEach((row, idx) => {
        const btn = row.querySelector('.remove-participant-btn');
        btn.style.display = rows.length > 1 ? 'inline-block' : 'none';
      });
    }

    document.getElementById('addParticipantBtn').addEventListener('click', () => {
      const container = document.getElementById('participantsContainer');
      const newRow = document.createElement('div');
      newRow.className = 'participant-row';
      newRow.innerHTML = `
        <input type="text" class="participant-address" placeholder="参与者公钥地址">
        <select class="participant-gender">
          <option value="Female">女性 (Female)</option>
          <option value="Male">男性 (Male)</option>
          <option value="NonBinary">非二元性别 (Non-binary)</option>
          <option value="Agender">无性别 (Agender)</option>
          <option value="TwoSpirit">双灵 (Two-Spirit)</option>
          <option value="PreferNotToSay">不愿透露</option>
        </select>
        <button type="button" class="remove-participant-btn">移除</button>
      `;
      container.appendChild(newRow);
      updateRemoveButtons();
      newRow.querySelector('.remove-participant-btn').addEventListener('click', function() {
        newRow.remove(); updateRemoveButtons();
      });
    });

    document.querySelectorAll('.remove-participant-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        btn.closest('.participant-row').remove(); updateRemoveButtons();
      });
    });
    updateRemoveButtons();

    document.getElementById('contractType').addEventListener('change', function(e) {
      const prefix = `[${e.target.value}] `;
      const textInput = document.getElementById('createText');
      if (!textInput.value.startsWith('[') || confirm('替换合约内容前缀？')) {
        textInput.value = prefix + (textInput.value.replace(/^\[.*?\]\s*/, ''));
      }
    });

    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!program) return alert("请先生成演示钱包！");
      const addressInputs = document.querySelectorAll('.participant-address');
      const genderSelects = document.querySelectorAll('.participant-gender');
      const participants = [];
      const genders = [];
      for (let i = 0; i < addressInputs.length; i++) {
        const addrStr = addressInputs[i].value.trim();
        if (!addrStr && i === 0 && walletPubkey) {
          participants.push(walletPubkey);
        } else {
          participants.push(new solanaWeb3.PublicKey(addrStr));
        }
        const genderVal = genderSelects[i].value;
        if (genderVal === 'Female') genders.push({ female: {} });
        else if (genderVal === 'Male') genders.push({ male: {} });
        else genders.push({ other: {} });
      }
      let contractText = document.getElementById('createText').value;
      const typeSelect = document.getElementById('contractType');
      const prefix = `[${typeSelect.value}] `;
      if (!contractText.startsWith('[')) contractText = prefix + contractText;
      
      const startDateVal = document.getElementById('createStartDate').value;
      const endDateVal = document.getElementById('createEndDate').value;
      if (!endDateVal) { alert("请选择结束日期"); return; }
      const endDate = new Date(endDateVal + "T00:00:00Z");
      const now = new Date();
      const startDate = startDateVal ? new Date(startDateVal + "T00:00:00Z") : now;
      // 计算有效天数（四舍五入）
      let durationDays = Math.round((endDate.getTime() - startDate.getTime()) / 86400000);
      if (durationDays < 1) { alert("结束日期必须晚于开始日期"); return; }
      if (startDateVal && startDate > now) {
        document.getElementById('dateHint').innerText = "⚠️ 合约将在所选开始日期后才生效（当前版本以创建时间为准）";
      }

      const contractKeypair = solanaWeb3.Keypair.generate();
      try {
        await program.methods.createContract(participants, genders, contractText, new anchor.BN(durationDays))
          .accounts({ contract: contractKeypair.publicKey, creator: walletPubkey, systemProgram: solanaWeb3.SystemProgram.programId })
          .signers([contractKeypair]).rpc();
        document.getElementById('createResult').innerHTML = `<p style="color:green">✅ 合约已创建！<br>地址: <strong>${contractKeypair.publicKey.toString()}</strong></p>`;
        updateBalance();
      } catch(e) { document.getElementById('createResult').innerHTML = `<p style="color:red">❌ 错误: ${e.message}</p>`; }
    });

    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!program) return alert("请先生成演示钱包！");
      const addr = document.getElementById('signContractAddr').value;
      try {
        await program.methods.signContract()
          .accounts({ contract: new solanaWeb3.PublicKey(addr), signer: walletPubkey }).rpc();
        document.getElementById('signResult').innerHTML = `<p style="color:green">✅ 签署成功！</p>`;
      } catch(e) { document.getElementById('signResult').innerHTML = `<p style="color:red">❌ 错误: ${e.message}</p>`; }
    });

    document.getElementById('queryBtn').addEventListener('click', async () => {
      if (!program) return alert("请先生成演示钱包！");
      const addr = document.getElementById('queryContractAddr').value;
      try {
        const contract = await program.account.marriageContract.fetch(new solanaWeb3.PublicKey(addr));
        let html = `<div class="contract-card">`;
        html += `<p><strong>发起人:</strong> ${contract.creator.toString()}</p>`;
        html += `<p><strong>合约文本:</strong> ${contract.contractText}</p>`;
        html += `<p><strong>创建时间:</strong> ${new Date(contract.createdAt.toNumber() * 1000).toLocaleString()}</p>`;
        const expires = contract.expiresAt.toNumber();
        html += `<p><strong>过期时间:</strong> ${expires === 0 ? '永久' : new Date(expires * 1000).toLocaleString()}</p>`;
        html += `<p><strong>状态:</strong> <span class="status-badge">${Object.keys(contract.status)[0]}</span></p>`;
        html += `<p><strong>参与者:</strong></p><ul>`;
        contract.participants.forEach(p => {
          const genderKey = Object.keys(p.gender)[0];
          const genderMap = { female: '女性', male: '男性', other: '其他' };
          html += `<li>${p.wallet.toString()} - ${genderMap[genderKey] || genderKey} - ${p.signed ? '已签' : '未签'}</li>`;
        });
        html += `</ul></div>`;
        document.getElementById('queryResult').innerHTML = html;
      } catch(e) { document.getElementById('queryResult').innerHTML = `<p style="color:red">❌ 合约不存在或读取失败</p>`; }
    });

    document.getElementById('aiAnalyzeBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return alert("请先输入 DeepSeek API Key");
      const contractText = document.getElementById('aiContractText').value.trim();
      if (!contractText) return alert("请输入合约条款内容");
      const resultDiv = document.getElementById('aiResult');
      resultDiv.innerHTML = "⏳ AI 正在分析...";
      const systemPrompt = `你是一位精通中国民法典、婚姻家庭法、合同法及意定监护制度的AI法律顾问。请分析以下协议条款，从法律角度给出风险提示和合规建议。用中文，分点叙述，语气温和。`;
      try {
        const response = await fetch("https://api.deepseek.com/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: "deepseek-chat",
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: contractText }
            ],
            temperature: 0.3, max_tokens: 1024
          })
        });
        if (!response.ok) throw new Error(`API 请求失败 (${response.status})`);
        const data = await response.json();
        const reply = data.choices[0].message.content;
        resultDiv.innerHTML = `<div class="ai-response"><strong>📋 法律风险分析：</strong><br><br>${reply.replace(/\n/g, '<br>')}</div>`;
      } catch (error) { resultDiv.innerHTML = `<p style="color:red">❌ 分析失败: ${error.message}</p>`; }
    });
  </script>
</body>
</html>
