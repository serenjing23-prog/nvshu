<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>女书 · 公开版</title>
  <script src="https://unpkg.com/@solana/web3.js@1.95.0/lib/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@coral-xyz/anchor@0.32.1/dist/browser/index.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "楷体","KaiTi","微软雅黑",sans-serif;
      background: #faf5ef;
      padding: 30px 20px;
      display: flex; justify-content: center;
      min-height: 100vh;
    }
    .container { 
      max-width: 720px; width: 100%;
      background: rgba(255,255,255,0.92);
      border-radius: 36px; padding: 40px 32px;
      box-shadow: 0 12px 40px rgba(180,100,100,0.15);
    }
    h1 { text-align: center; font-size: 2.8em; color: #b8404c; }
    .subtitle { text-align: center; color: #a05a60; margin-bottom: 36px; font-size: 1.1em; }
    button { background: #b8404c; color: white; border: none; padding: 12px 28px; border-radius: 28px; cursor: pointer; font-size: 1em; margin: 8px 5px; }
    button:hover { background: #9c3540; }
    input, textarea, select { width: 100%; padding: 12px 16px; margin: 6px 0 14px; border: 1px solid #e8d0d0; border-radius: 16px; font-size: 0.95em; }
    label { font-weight: bold; display: block; margin-top: 16px; }
    .section { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1px solid #f5e8e8; }
    .hint { font-size: 0.88em; color: #888; margin-top: 6px; }
    .contract-card { background: #fff; border: 1px solid #f0e0e0; border-radius: 20px; padding: 20px; margin-top: 14px; }
    .status-badge { background: #f8e8e8; color: #b8404c; padding: 6px 16px; border-radius: 20px; }
    hr { border: 0; border-top: 1px solid #f0e0e0; margin: 24px 0; }
    .participant-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .participant-row input { flex: 2; margin: 0; }
    .participant-row select { flex: 1.5; margin: 0; }
    .participant-row button { flex: 0.5; margin: 0; background: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="subtitle">婚姻即议定协议 | 链上合约工具 · 公开版</div>

    <div class="section">
      <h2>🔗 连接钱包</h2>
      <button id="connectBtn">👛 连接浏览器钱包</button>
      <button id="disconnectBtn" style="display:none; background:#888;">断开</button>
      <p id="walletStatus" class="hint">未连接</p>
    </div>

    <div class="section">
      <h2>✍️ 创建新合约</h2>
      <label>协议类型</label>
      <select id="contractType">
        <option value="婚姻议定">婚姻议定</option>
        <option value="意定监护协议">意定监护协议</option>
        <option value="养老互助协议">养老互助协议</option>
        <option value="自定义协议">自定义协议</option>
      </select>

      <label>参与者信息</label>
      <div id="participantsContainer">
        <div class="participant-row">
          <input type="text" class="participant-address" placeholder="公钥地址（留空则为自己）">
          <select class="participant-gender">
            <option value="female">女性</option>
            <option value="male">男性</option>
            <option value="other">其他</option>
          </select>
          <button type="button" class="remove-participant-btn" style="display:none;">移除</button>
        </div>
      </div>
      <button id="addParticipantBtn" style="background:#6a1b9a;">➕ 添加参与者</button>

      <label>开始日期 (可选)</label>
      <input type="date" id="startDate">
      <label>结束日期 (必填)</label>
      <input type="date" id="endDate">
      <p id="dateHint" class="hint"></p>

      <label>合约内容</label>
      <input type="text" id="contractText" placeholder="例如：我指定对方为意定监护人...">
      <button id="createBtn">✨ 创建合约</button>
      <div id="createResult" class="hint"></div>
    </div>

    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <input type="text" id="signAddr" placeholder="输入合约地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult" class="hint"></div>
    </div>

    <div class="section">
      <h2>🔍 查询合约</h2>
      <input type="text" id="queryAddr" placeholder="输入合约地址">
      <button id="queryBtn">查询详情</button>
      <div id="queryResult"></div>
    </div>

    <div class="section">
      <h2>🧠 AI 法律顾问</h2>
      <select id="lawJurisdiction">
        <option value="china">中国民法</option>
        <option value="california">美国加州家庭法</option>
        <option value="europe">欧洲</option>
        <option value="custom">自定义</option>
      </select>
      <textarea id="aiText" rows="2" placeholder="粘贴合约条款..."></textarea>
      <input type="password" id="apiKey" placeholder="DeepSeek API Key">
      <button id="aiBtn">🔍 分析风险</button>
      <div id="aiResult" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    const IDL = {"version": "0.1.0", "name": "nvshu", "instructions": [{"name": "createContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": true}, {"name": "creator", "isMut": true, "isSigner": true}, {"name": "systemProgram", "isMut": false, "isSigner": false}], "args": [{"name": "participantWallets", "type": {"vec": "publicKey"}}, {"name": "genders", "type": {"vec": {"defined": "Gender"}}}, {"name": "contractText", "type": "string"}, {"name": "durationDays", "type": "i64"}]}, {"name": "signContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "signer", "isMut": false, "isSigner": true}], "args": []}, {"name": "annulContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "authority", "isMut": false, "isSigner": true}], "args": []}], "accounts": [{"name": "MarriageContract", "type": {"kind": "struct", "fields": [{"name": "creator", "type": "publicKey"}, {"name": "participants", "type": {"vec": {"defined": "Participant"}}}, {"name": "contractText", "type": "string"}, {"name": "createdAt", "type": "i64"}, {"name": "expiresAt", "type": "i64"}, {"name": "status", "type": {"defined": "ContractStatus"}}]}}], "types": [{"name": "Participant", "type": {"kind": "struct", "fields": [{"name": "wallet", "type": "publicKey"}, {"name": "gender", "type": {"defined": "Gender"}}, {"name": "signed", "type": "bool"}]}}, {"name": "Gender", "type": {"kind": "enum", "variants": [{"name": "Female"}, {"name": "Male"}, {"name": "Other"}]}}, {"name": "ContractStatus", "type": {"kind": "enum", "variants": [{"name": "Pending"}, {"name": "Active"}, {"name": "Expired"}, {"name": "Annulled"}]}}], "errors": [{"code": 6000, "name": "NotAParticipant", "msg": "You are not a participant of this contract."}, {"code": 6001, "name": "AlreadySigned", "msg": "You have already signed this contract."}, {"code": 6002, "name": "NotActive", "msg": "Contract is not active."}]};
    const PROGRAM_ID = new solanaWeb3.PublicKey("FuCn9zJcTa3Agq3vAVwknTiJR62Y66bDmPX4GhMMwNSo");
    let connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    let provider, program, walletPublicKey;

    // 连接钱包
    document.getElementById('connectBtn').addEventListener('click', async () => {
      if (!window.solana) return alert('请安装Phantom钱包');
      try {
        await window.solana.connect();
        walletPublicKey = window.solana.publicKey;
        const wallet = {
          publicKey: walletPublicKey,
          signTransaction: (tx) => window.solana.signTransaction(tx),
          signAllTransactions: (txs) => window.solana.signAllTransactions(txs)
        };
        provider = new anchor.AnchorProvider(connection, wallet, {});
        anchor.setProvider(provider);
        program = new anchor.Program(IDL, PROGRAM_ID, provider);
        document.getElementById('walletStatus').innerText = '已连接: ' + walletPublicKey.toString().slice(0,8)+'...';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('disconnectBtn').style.display = 'inline-block';
      } catch(e) { alert('连接失败: ' + e.message); }
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      window.solana.disconnect();
      walletPublicKey = null; program = null;
      document.getElementById('walletStatus').innerText = '未连接';
      document.getElementById('connectBtn').style.display = 'inline-block';
      document.getElementById('disconnectBtn').style.display = 'none';
    });

    // 动态参与者
    function updateRemoveButtons() {
      document.querySelectorAll('.participant-row').forEach(r => {
        const btn = r.querySelector('.remove-participant-btn');
        if(btn) btn.style.display = document.querySelectorAll('.participant-row').length > 1 ? 'inline-block' : 'none';
      });
    }
    document.getElementById('addParticipantBtn').addEventListener('click', () => {
      const row = document.createElement('div'); row.className = 'participant-row';
      row.innerHTML = `<input type="text" class="participant-address" placeholder="公钥地址"><select class="participant-gender"><option value="female">女性</option><option value="male">男性</option><option value="other">其他</option></select><button type="button" class="remove-participant-btn" style="background:#888;">移除</button>`;
      document.getElementById('participantsContainer').appendChild(row);
      updateRemoveButtons();
      row.querySelector('.remove-participant-btn').addEventListener('click', () => { row.remove(); updateRemoveButtons(); });
    });
    updateRemoveButtons();

    // 日期提示
    document.getElementById('endDate').addEventListener('change', function() {
      const s = document.getElementById('startDate').value, e = this.value;
      if(s && e) document.getElementById('dateHint').innerText = Math.round((new Date(e)-new Date(s))/86400000) > 0 ? `有效期约 ${Math.round((new Date(e)-new Date(s))/86400000)} 天` : '结束日期必须晚于开始日期';
    });

    // 创建合约
    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!program) return alert('请先连接钱包');
      const participants = [], genders = [];
      document.querySelectorAll('.participant-row').forEach(row => {
        const addr = row.querySelector('.participant-address').value.trim();
        const gen = row.querySelector('.participant-gender').value;
        participants.push(addr ? new solanaWeb3.PublicKey(addr) : walletPublicKey);
        genders.push({ [gen]: {} });
      });
      const endDate = new Date(document.getElementById('endDate').value);
      const startDate = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : new Date();
      const days = Math.round((endDate - startDate) / 86400000);
      if(days < 1) return alert('结束日期必须晚于开始日期');
      let text = document.getElementById('contractText').value || "自定义协议";
      const prefix = `[${document.getElementById('contractType').value}] `;
      if(!text.startsWith('[')) text = prefix + text;
      const contractKP = anchor.web3.Keypair.generate();
      try {
        await program.methods.createContract(participants, genders, text, new anchor.BN(days))
          .accounts({ contract: contractKP.publicKey, creator: walletPublicKey, systemProgram: anchor.web3.SystemProgram.programId })
          .signers([contractKP]).rpc();
        document.getElementById('createResult').innerHTML = `✅ 合约已创建！<br><strong>${contractKP.publicKey.toString()}</strong>`;
      } catch(e) { document.getElementById('createResult').innerHTML = `❌ ${e.message}`; }
    });

    // 签署合约
    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!program) return alert('请先连接钱包');
      const addr = document.getElementById('signAddr').value.trim();
      if(!addr) return alert('请输入合约地址');
      try {
        await program.methods.signContract()
          .accounts({ contract: new solanaWeb3.PublicKey(addr), signer: walletPublicKey }).rpc();
        document.getElementById('signResult').innerHTML = '✅ 签署成功';
      } catch(e) { document.getElementById('signResult').innerHTML = `❌ ${e.message}`; }
    });

    // 查询合约
    document.getElementById('queryBtn').addEventListener('click', async () => {
      const addr = document.getElementById('queryAddr').value.trim();
      if(!addr) return;
      try {
        const contract = await program.account.marriageContract.fetch(new solanaWeb3.PublicKey(addr));
        const status = Object.keys(contract.status)[0] || 'unknown';
        const expires = contract.expiresAt?.toNumber?.() === 0 ? '永久' : new Date(contract.expiresAt?.toNumber?.() * 1000).toLocaleString();
        let html = `<div class="contract-card"><p><strong>发起人：</strong>${contract.creator}</p><p><strong>内容：</strong>${contract.contractText}</p><p><strong>创建时间：</strong>${new Date(contract.createdAt?.toNumber?.() * 1000).toLocaleString()}</p><p><strong>过期时间：</strong>${expires}</p><p><strong>状态：</strong><span class="status-badge">${status}</span></p><ul>`;
        contract.participants.forEach(p => html += `<li>${p.wallet} - ${Object.keys(p.gender)[0]} - ${p.signed ? '已签' : '未签'}</li>`);
        html += '</ul></div>';
        document.getElementById('queryResult').innerHTML = html;
      } catch(e) { document.getElementById('queryResult').innerHTML = `❌ ${e.message}`; }
    });

    // AI 分析
    document.getElementById('aiBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return alert('请输入API Key');
      const text = document.getElementById('aiText').value.trim();
      if (!text) return alert('请输入条款');
      const resDiv = document.getElementById('aiResult'); resDiv.innerHTML = '⏳ 分析中...';
      const j = document.getElementById('lawJurisdiction').value;
      let ctx = '你是一位法律顾问。';
      if(j==='china') ctx = '你是一位精通中国民法典的AI法律顾问。';
      else if(j==='california') ctx = '你是一位精通美国加州家庭法的AI法律顾问。';
      else if(j==='europe') ctx = '你是一位精通欧洲人权公约的AI法律顾问。';
      try {
        const resp = await fetch('https://api.deepseek.com/chat/completions', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
          body: JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:`${ctx} 请分析以下协议条款，用中文给出风险提示。`},{role:'user',content:text}],temperature:0.3})
        });
        const data = await resp.json();
        resDiv.innerHTML = `<div style="white-space:pre-wrap;background:#fff;padding:12px;border-radius:8px;">📋 ${data.choices[0].message.content.replace(/\n/g, '<br>')}</div>`;
      } catch(e) { resDiv.innerHTML = `❌ ${e.message}`; }
    });
  </script>
</body>
</html>
