<html lang="zh">

  <script src="https://unpkg.com/@solana/web3.js@1.95.0/lib/index.iife.min.js"></script>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      font-family: "楷体","KaiTi","微软雅黑",sans-serif;

<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="title">“婚姻”即议定协议 | 链上合约工具</div>

    <!-- 钱包模块 -->
    <div id="walletBox" class="section">
      <h2>👛 钱包管理</h2>
      <button id="connectBrowserWalletBtn" style="display:none;">🔗 连接浏览器钱包</button>
      <button id="disconnectBrowserWalletBtn" style="display:none; background:#888;">断开钱包</button>

          <div><input type="radio" name="activeWallet" value="B" onchange="switchActiveWallet('B')"> 使用此钱包</div>

    <!-- 创建合约模块 -->
    <div class="section">
      <h2>✍️ 创建新合约</h2>

      <select id="contractType">
        <option value="婚姻议定">“婚姻”议定</option>

        <option value="养老互助协议">养老互助协议</option>

      <label>参与者信息</label>
      <div id="participantsContainer">

      <input type="text" id="createText" placeholder="例如：我们互相守护，约定未来三年共同居住">

    <!-- 签署与查询模块 -->
    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <label>合约地址</label>
      <input type="text" id="signContractAddr" placeholder="输入已有合约的公钥地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult"></div>
    </div>
    <div class="section">
      <h2>🔍 查询合约</h2>
      <label>合约地址</label>
      <input type="text" id="queryContractAddr" placeholder="输入合约公钥地址">
      <button id="queryBtn">查询合约详情</button>
      <div id="queryResult"></div>
    </div>

    <!-- AI 法律顾问模块 -->
    <div class="section">
      <h2>🧠 AI 法律顾问</h2>
      <label>法律管辖区</label>
      <select id="lawJurisdiction">
        <option value="china">中国民法</option>
        <option value="california">美国加州家庭法</option>
        <option value="europe">欧洲（通用）</option>
        <option value="custom">其他（自定义）</option>
      </select>
      <div id="customLawBox" style="display:none;">
        <label>自定义法律背景描述</label>
        <input type="text" id="customLawContext" placeholder="例如：根据伊斯兰教法...">
      </div>
      <label>输入你的合约条款</label>
      <textarea id="aiContractText" rows="3" placeholder="描述你们的约定..."></textarea>
      <label>你的 DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
      <button id="aiAnalyzeBtn">🔍 分析法律风险</button>
      <div id="aiResult" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    // ---------- 自定义 Borsh 序列化 ----------
    const borsh = {
      serialize(schema, data) {
        const buffer = [];
        this._serialize(buffer, schema, data);
        return Buffer.from(buffer);
      },
      _serialize(buffer, schema, data) {
        if (schema === 'u8') {
          buffer.push(data & 0xff);
        } else if (schema === 'i64') {
          // 小端 i64
          const arr = new Array(8);
          const view = new DataView(new ArrayBuffer(8));
          view.setBigInt64(0, BigInt(data), true);
          for (let i = 0; i < 8; i++) buffer.push(view.getUint8(i));
        } else if (schema === 'pubkey') {
          const bytes = data.toBytes();
          for (let i = 0; i < 32; i++) buffer.push(bytes[i]);
        } else if (schema === 'string') {
          const encoder = new TextEncoder();
          const bytes = encoder.encode(data);
          // 4 byte little endian length prefix
          const len = bytes.length;
          buffer.push(len & 0xff, (len >> 8) & 0xff, (len >> 16) & 0xff, (len >> 24) & 0xff);
          for (let i = 0; i < bytes.length; i++) buffer.push(bytes[i]);
        } else if (Array.isArray(schema)) {
          // Vec<T>
          const len = data.length;
          buffer.push(len & 0xff, (len >> 8) & 0xff, (len >> 16) & 0xff, (len >> 24) & 0xff);
          for (let item of data) {
            this._serialize(buffer, schema[0], item);
          }
        } else if (typeof schema === 'object' && !Array.isArray(schema)) {
          // Enum or Struct
          const keys = Object.keys(schema);
          // If it has a 'kind' field, it's an enum
          if (schema.kind === 'enum') {
            const variantKey = Object.keys(data)[0];
            const variantIndex = keys.indexOf(variantKey);
            buffer.push(variantIndex);
            if (data[variantKey] && typeof data[variantKey] === 'object') {
              this._serialize(buffer, schema[variantKey], data[variantKey]);
            }
          } else {
            // Struct: order by keys
            for (let key of keys) {
              this._serialize(buffer, schema[key], data[key]);
            }
          }
        }
      },
      deserialize(schema, buffer) {
        const reader = { buffer, offset: 0 };
        return this._deserialize(schema, reader);
      },
      _deserialize(schema, reader) {
        // 简化版，仅用于读取合约状态（已经用不到复杂的反序列化，查询时直接解析账户数据）
        // 这里略
      }
    };

    // ---------- 全局变量 ----------
    const PROGRAM_ID = new solanaWeb3.PublicKey("FuCn9zJcTa3Agq3vAVwknTiJR62Y66bDmPX4GhMMwNSo");
    const IDL = {"version": "0.1.0", "name": "nvshu", "instructions": [{"name": "createContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": true}, {"name": "creator", "isMut": true, "isSigner": true}, {"name": "systemProgram", "isMut": false, "isSigner": false}], "args": [{"name": "participantWallets", "type": {"vec": "publicKey"}}, {"name": "genders", "type": {"vec": {"defined": "Gender"}}}, {"name": "contractText", "type": "string"}, {"name": "durationDays", "type": "i64"}]}, {"name": "signContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "signer", "isMut": false, "isSigner": true}], "args": []}, {"name": "annulContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "authority", "isMut": false, "isSigner": true}], "args": []}], "accounts": [{"name": "MarriageContract", "type": {"kind": "struct", "fields": [{"name": "creator", "type": "publicKey"}, {"name": "participants", "type": {"vec": {"defined": "Participant"}}}, {"name": "contractText", "type": "string"}, {"name": "createdAt", "type": "i64"}, {"name": "expiresAt", "type": "i64"}, {"name": "status", "type": {"defined": "ContractStatus"}}]}}], "types": [{"name": "Participant", "type": {"kind": "struct", "fields": [{"name": "wallet", "type": "publicKey"}, {"name": "gender", "type": {"defined": "Gender"}}, {"name": "signed", "type": "bool"}]}}, {"name": "Gender", "type": {"kind": "enum", "variants": [{"name": "Female"}, {"name": "Male"}, {"name": "Other"}]}}, {"name": "ContractStatus", "type": {"kind": "enum", "variants": [{"name": "Pending"}, {"name": "Active"}, {"name": "Expired"}, {"name": "Annulled"}]}}], "errors": [{"code": 6000, "name": "NotAParticipant", "msg": "You are not a participant of this contract."}, {"code": 6001, "name": "AlreadySigned", "msg": "You have already signed this contract."}, {"code": 6002, "name": "NotActive", "msg": "Contract is not active."}]};

    let connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    let testWalletA, testWalletB, browserSigner, browserPublicKey;
    let activeWalletType = 'A';
    let activeSigner = null;
    let activePublicKey = null;

    // 初始化：检测浏览器钱包
    function init() {
      if (window.solana && window.solana.isPhantom) {
        document.getElementById('connectBrowserWalletBtn').style.display = 'inline-block';
      }
      // 动态参与者移除按钮
      updateRemoveButtons();
    }

    // --- 钱包逻辑 ---

    document.getElementById('connectBrowserWalletBtn').addEventListener('click', async () => {
      const adapter = window.solana;
      if (!adapter) return alert("未检测到 Solana 钱包扩展");
      try {
        const resp = await adapter.connect();
        browserPublicKey = resp.publicKey;
        browserSigner = adapter;
        document.getElementById('browserWalletAddress').innerText = browserPublicKey.toString();
        document.getElementById('browserWalletContainer').style.display = 'block';
        document.getElementById('connectBrowserWalletBtn').style.display = 'none';
        document.getElementById('disconnectBrowserWalletBtn').style.display = 'inline-block';
        setActiveWallet(browserSigner, browserPublicKey, 'browser');
        document.querySelector('.participant-address').placeholder = browserPublicKey.toString();
      } catch(e) { alert("连接失败: " + e.message); }
    });

    document.getElementById('disconnectBrowserWalletBtn').addEventListener('click', async () => {
      if (browserSigner && browserSigner.disconnect) await browserSigner.disconnect();
      browserSigner = null; browserPublicKey = null;
      document.getElementById('browserWalletContainer').style.display = 'none';
      document.getElementById('connectBrowserWalletBtn').style.display = 'inline-block';
      document.getElementById('disconnectBrowserWalletBtn').style.display = 'none';
      if (activeWalletType === 'browser' && testWalletA) setActiveWallet(testWalletA, testWalletA.publicKey, 'A');
    });

    function switchActiveWallet(type) {
      if (type === 'A' && testWalletA) setActiveWallet(testWalletA, testWalletA.publicKey, 'A');
      else if (type === 'B' && testWalletB) setActiveWallet(testWalletB, testWalletB.publicKey, 'B');
      else if (type === 'browser' && browserSigner) setActiveWallet(browserSigner, browserPublicKey, 'browser');
    }

    function setActiveWallet(signer, publicKey, type) {
      activeWalletType = type; activeSigner = signer; activePublicKey = publicKey;
      document.querySelectorAll('.wallet-card').forEach(c => c.classList.remove('active-wallet'));
      if (type === 'A') document.getElementById('walletACard').classList.add('active-wallet');
      else if (type === 'B') document.getElementById('walletBCard').classList.add('active-wallet');
      else if (type === 'browser') document.getElementById('browserWalletCard').classList.add('active-wallet');
      document.querySelector('.participant-address').placeholder = publicKey.toString();
    }

    async function updateTestBalances() {
      if (testWalletA) { const b = await connection.getBalance(testWalletA.publicKey); document.getElementById('walletABalance').innerText = `余额: ${b/1e9} SOL`; }
      if (testWalletB) { const b = await connection.getBalance(testWalletB.publicKey); document.getElementById('walletBBalance').innerText = `余额: ${b/1e9} SOL`; }
    }

    // --- 参与者动态行 ---
    function updateRemoveButtons() {
      const rows = document.querySelectorAll('.participant-row');
      rows.forEach(r => {
        const btn = r.querySelector('.remove-participant-btn');
        if (btn) btn.style.display = rows.length > 1 ? 'inline-block' : 'none';
      });
    }
    document.getElementById('addParticipantBtn').addEventListener('click', () => {
      const container = document.getElementById('participantsContainer');
      const newRow = document.createElement('div');
      newRow.className = 'participant-row';
      newRow.style.cssText = 'display:flex; gap:10px; margin-bottom:10px; align-items:center;';
      newRow.innerHTML = `
        <input type="text" class="participant-address" placeholder="参与者公钥地址" style="flex:2; margin:0;">
        <select class="participant-gender" style="flex:1.5; margin:0;">
          <option value="Female">女性 (Female)</option>
          <option value="Male">男性 (Male)</option>
          <option value="NonBinary">非二元性别</option>
          <option value="Agender">无性别</option>
          <option value="TwoSpirit">双灵</option>
          <option value="PreferNotToSay">不愿透露</option>
        </select>
        <button type="button" class="remove-participant-btn" style="flex:0.5; margin:0; background:#888;">移除</button>
      `;
      container.appendChild(newRow);
      updateRemoveButtons();
      newRow.querySelector('.remove-participant-btn').addEventListener('click', function() {
        newRow.remove(); updateRemoveButtons();
      });
    });
    document.querySelectorAll('.remove-participant-btn').forEach(btn => {
      btn.addEventListener('click', function() { btn.closest('.participant-row').remove(); updateRemoveButtons(); });
    });

    // 日期提示、协议前缀 (略，保持已有功能)
    document.getElementById('createEndDate').addEventListener('change', function() {
      const s = document.getElementById('createStartDate').value, e = this.value;
      if(s && e) {
        const days = Math.round((new Date(e+'T00:00:00Z') - new Date(s+'T00:00:00Z'))/86400000);
        document.getElementById('dateHint').innerText = days>0 ? `合约有效期约 ${days} 天` : '❌ 结束日期必须晚于开始日期';
      }
    });
    document.getElementById('contractType').addEventListener('change', function() {
      const prefix = `[${this.value}] `;
      const textInput = document.getElementById('createText');
      if(!textInput.value.startsWith('[')) textInput.value = prefix + textInput.value.replace(/^\[.*?\]\s*/, '');
    });

    // ---------- 交易构造 ----------
    async function sendTransaction(instruction, signers = []) {
      if (!activePublicKey) throw new Error('钱包未连接');
      let tx = new solanaWeb3.Transaction().add(instruction);
      const { blockhash } = await connection.getLatestBlockhash();
      tx.recentBlockhash = blockhash;
      tx.feePayer = activePublicKey;
      if (activeWalletType === 'browser') {
        const signed = await activeSigner.signTransaction(tx);
        const txid = await connection.sendRawTransaction(signed.serialize());
        await connection.confirmTransaction(txid);
        return txid;
      } else {
        tx.sign(...signers);
        const txid = await connection.sendRawTransaction(tx.serialize());
        await connection.confirmTransaction(txid);
        return txid;
      }
    }

    // 构造 create_contract 指令
    function buildCreateInstruction(contractAccount, creator, participants, genders, text, durationDays) {
      const schema = {
        create_contract: {
          participant_wallets: ['pubkey'],
          genders: [{ kind: 'enum', Female: {}, Male: {}, Other: {} }],
          contract_text: 'string',
          duration_days: 'i64'
        }
      };
      const dataLayout = [
        'u8', // instruction index = 0
        ['pubkey'], // Vec<Pubkey>
        [{ kind: 'enum', Female: {}, Male: {}, Other: {} }], // Vec<Gender>
        'string', // String
        'i64' // i64
      ];
      // 手动序列化更直接
      const buffer = [];
      buffer.push(0); // 指令索引
      // vec<Pubkey>
      const len = participants.length;
      buffer.push(len & 0xff, (len>>8)&0xff, (len>>16)&0xff, (len>>24)&0xff);
      participants.forEach(p => {
        const bytes = p.toBytes();
        for (let i=0;i<32;i++) buffer.push(bytes[i]);
      });
      // vec<Gender>
      buffer.push(len & 0xff, (len>>8)&0xff, (len>>16)&0xff, (len>>24)&0xff);
      const genderMap = { Female: 0, Male: 1, Other: 2 };
      genders.forEach(g => {
        const key = Object.keys(g)[0];
        buffer.push(genderMap[key] || 2);
      });
      // string
      const encoder = new TextEncoder();
      const strBytes = encoder.encode(text);
      const strLen = strBytes.length;
      buffer.push(strLen & 0xff, (strLen>>8)&0xff, (strLen>>16)&0xff, (strLen>>24)&0xff);
      for (let i=0;i<strBytes.length;i++) buffer.push(strBytes[i]);
      // i64
      const view = new DataView(new ArrayBuffer(8));
      view.setBigInt64(0, BigInt(durationDays), true);
      for (let i=0;i<8;i++) buffer.push(view.getUint8(i));

      const data = Buffer.from(buffer);
      const keys = [
        { pubkey: contractAccount, isSigner: true, isWritable: true },
        { pubkey: creator, isSigner: true, isWritable: true },
        { pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false }
      ];
      return new solanaWeb3.TransactionInstruction({ keys, programId: PROGRAM_ID, data });
    }

    function buildSignInstruction(contractAccount, signerPubkey) {
      const buffer = [1]; // 指令索引 sign_contract = 1
      return new solanaWeb3.TransactionInstruction({
        keys: [
          { pubkey: contractAccount, isSigner: false, isWritable: true },
          { pubkey: signerPubkey, isSigner: true, isWritable: false }
        ],
        programId: PROGRAM_ID,
        data: Buffer.from(buffer)
      });
    }

    // 创建合约按钮
    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!activePublicKey) return alert("请先生成或连接钱包");
      const addressInputs = document.querySelectorAll('.participant-address');
      const genderSelects = document.querySelectorAll('.participant-gender');
      const participants = [], genders = [];
      for (let i=0; i<addressInputs.length; i++) {
        const addrStr = addressInputs[i].value.trim();
        participants.push(addrStr ? new solanaWeb3.PublicKey(addrStr) : activePublicKey);
        const gVal = genderSelects[i].value;
        if (gVal === 'Female') genders.push({ Female: {} });
        else if (gVal === 'Male') genders.push({ Male: {} });
        else genders.push({ Other: {} });
      }
      const endDateVal = document.getElementById('createEndDate').value;
      if (!endDateVal) return alert("请选择结束日期");
      const endDate = new Date(endDateVal + "T00:00:00Z");
      const startDateVal = document.getElementById('createStartDate').value;
      const startDate = startDateVal ? new Date(startDateVal + "T00:00:00Z") : new Date();
      const durationDays = Math.round((endDate - startDate) / 86400000);
      if (durationDays < 1) return alert("结束日期必须晚于开始日期");
      let text = document.getElementById('createText').value;
      const typeSelect = document.getElementById('contractType');
      const prefix = `[${typeSelect.value}] `;
      if (!text.startsWith('[')) text = prefix + text;

      const contractKeypair = solanaWeb3.Keypair.generate();
      const instruction = buildCreateInstruction(contractKeypair.publicKey, activePublicKey, participants, genders, text, durationDays);
      try {
        await sendTransaction(instruction, [contractKeypair]);
        document.getElementById('createResult').innerHTML = `<p style="color:green">✅ 合约已创建！<br>地址: <strong>${contractKeypair.publicKey.toString()}</strong></p>`;
        if (activeWalletType !== 'browser') updateTestBalances();
      } catch(e) {
        document.getElementById('createResult').innerHTML = `<p style="color:red">❌ 错误: ${e.message}</p>`;
        console.error(e);
      }
    });

    // 签署合约
    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!activePublicKey) return alert("请先生成或连接钱包");
      const addr = document.getElementById('signContractAddr').value;
      if (!addr) return alert("请输入合约地址");
      try {
        await sendTransaction(buildSignInstruction(new solanaWeb3.PublicKey(addr), activePublicKey));
        document.getElementById('signResult').innerHTML = `<p style="color:green">✅ 签署成功！</p>`;
      } catch(e) {
        document.getElementById('signResult').innerHTML = `<p style="color:red">❌ 错误: ${e.message}</p>`;
        console.error(e);
      }
    });

    // 查询合约 (需要手动解析账户数据，简化版读取)
    document.getElementById('queryBtn').addEventListener('click', async () => {
      const addr = document.getElementById('queryContractAddr').value;
      if (!addr) return;
      try {
        const accountInfo = await connection.getAccountInfo(new solanaWeb3.PublicKey(addr));
        if (!accountInfo) throw new Error('账户不存在');
        // 使用IDL解析比较复杂，先显示原始数据摘要
        const data = accountInfo.data;
        // 手动解析关键字段 (仅用于演示)
        const creator = new solanaWeb3.PublicKey(data.slice(8, 40)); // 跳过8字节anchor discriminator
        let offset = 40;
        // 跳过Vec<Participant> -> 4字节长度 + N*34
        const partLen = data.readUInt32LE(offset); offset += 4;
        const participants = [];
        for(let i=0; i<partLen; i++) {
          const wallet = new solanaWeb3.PublicKey(data.slice(offset, offset+32)); offset += 32;
          const gender = data.readUInt8(offset); offset += 1;
          const signed = data.readUInt8(offset) === 1; offset += 1;
          participants.push({ wallet: wallet.toString(), gender: ['Female','Male','Other'][gender]||'Other', signed });
        }
        // 合约文本
        const textLen = data.readUInt32LE(offset); offset += 4;
        const text = new TextDecoder().decode(data.slice(offset, offset+textLen)); offset += textLen;
        const createdAt = Number(data.readBigInt64LE(offset)); offset += 8;
        const expiresAt = Number(data.readBigInt64LE(offset)); offset += 8;
        const status = data.readUInt8(offset);
        const statusStr = ['Pending','Active','Expired','Annulled'][status] || 'Unknown';

        let html = `<div class="contract-card">`;
        html += `<p><strong>发起人:</strong> ${creator.toString()}</p>`;
        html += `<p><strong>合约文本:</strong> ${text}</p>`;
        html += `<p><strong>创建时间:</strong> ${new Date(createdAt*1000).toLocaleString()}</p>`;
        html += `<p><strong>过期时间:</strong> ${expiresAt===0 ? '永久' : new Date(expiresAt*1000).toLocaleString()}</p>`;
        html += `<p><strong>状态:</strong> <span class="status-badge">${statusStr}</span></p>`;
        html += `<p><strong>参与者:</strong></p><ul>`;
        participants.forEach(p => html += `<li>${p.wallet} - ${p.gender} - ${p.signed ? '已签' : '未签'}</li>`);
        html += `</ul></div>`;
        document.getElementById('queryResult').innerHTML = html;
      } catch(e) { document.getElementById('queryResult').innerHTML = `<p style="color:red">❌ 查询失败: ${e.message}</p>`; }
    });

    // AI 法律顾问 (不变)
    document.getElementById('aiAnalyzeBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return alert("请先输入 DeepSeek API Key");
      const contractText = document.getElementById('aiContractText').value.trim();
      if (!contractText) return alert("请输入合约条款");
      const resultDiv = document.getElementById('aiResult');
      resultDiv.innerHTML = "⏳ AI 正在分析...";
      const jurisdiction = document.getElementById('lawJurisdiction').value;
      let lawContext = "你是一位精通相关法律的法律顾问。";
      if (jurisdiction === "china") lawContext = "你是一位精通中国民法典、婚姻家庭法、合同法及意定监护制度的AI法律顾问。";
      else if (jurisdiction === "california") lawContext = "你是一位精通美国加利福尼亚州家庭法的AI法律顾问。";
      else if (jurisdiction === "europe") lawContext = "你是一位精通欧洲人权公约和家庭法的AI法律顾问。";
      else if (jurisdiction === "custom") {
        const customCtx = document.getElementById('customLawContext').value.trim();
        if (!customCtx) return alert("请输入自定义法律背景");
        lawContext = customCtx;
      }
      const systemPrompt = `${lawContext} 请分析以下协议条款，从法律角度给出风险提示和合规建议。用中文，分点叙述，语气温和。最后强调这不构成法律意见。`;
      try {
        const resp = await fetch("https://api.deepseek.com/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "system", content: systemPrompt }, { role: "user", content: contractText }], temperature: 0.3, max_tokens: 1024 })
        });
        if (!resp.ok) throw new Error(`API 请求失败 (${resp.status})`);
        const data = await resp.json();
        const reply = data.choices[0].message.content;
        resultDiv.innerHTML = `<div class="ai-response"><strong>📋 法律风险分析：</strong><br><br>${reply.replace(/\n/g, '<br>')}</div>`;
      } catch(e) { resultDiv.innerHTML = `<p style="color:red">❌ 分析失败: ${e.message}</p>`; }
    });
    document.getElementById('lawJurisdiction').addEventListener('change', function() {
      document.getElementById('customLawBox').style.display = this.value === 'custom' ? 'block' : 'none';
    });

    init();
  </script>
</body>
</html>
