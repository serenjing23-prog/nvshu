<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>女书 · 公开版</title>
  <script src="https://unpkg.com/@solana/web3.js@1.95.0/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/@project-serum/anchor@0.30.1/dist/browser/index.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "楷体","KaiTi","Noto Serif SC","微软雅黑",sans-serif;
      background: #faf5ef; 
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(245,225,220,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(235,215,210,0.2) 0%, transparent 50%),
        linear-gradient(45deg, rgba(230,210,200,0.08) 25%, transparent 25%, transparent 75%, rgba(230,210,200,0.08) 75%),
        linear-gradient(45deg, rgba(230,210,200,0.08) 25%, transparent 25%, transparent 75%, rgba(230,210,200,0.08) 75%);
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
      background-position: 0 0, 0 0, 0 0, 30px 30px;
      background-attachment: fixed;
      color: #4a3b3c; 
      padding: 30px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container { 
      max-width: 720px; width: 100%; 
      background: rgba(255,255,255,0.9); 
      border-radius: 32px; padding: 40px 32px; 
      box-shadow: 0 8px 32px rgba(180,100,100,0.12);
      border: 1px solid #f0e0e0;
    }
    h1 { 
      text-align: center; font-size: 2.8em; margin:0; 
      color: #b8404c; letter-spacing: 6px;
      position: relative; font-weight: 500;
    }
    h1::before, h1::after {
      content: "𛆉"; font-size: 0.6em; color: #c77d7d; opacity: 0.7;
    }
    h1::after { content: "𛆊"; }
    .subtitle { 
      text-align: center; font-size: 1.1em; color: #a05a60; 
      margin-bottom: 36px; padding: 12px 0;
      border-top: 1px dashed #e2c8c8; border-bottom: 1px dashed #e2c8c8;
      letter-spacing: 2px;
    }
    button { 
      background: #b8404c; color: white; border: none; 
      padding: 12px 24px; border-radius: 28px; cursor: pointer; 
      font-size: 0.95em; margin: 8px 5px; 
      transition: background 0.2s;
    }
    button:hover { background: #9c3540; }
    input, textarea, select { 
      width: 100%; padding: 12px 14px; margin: 6px 0 14px; 
      border: 1px solid #e8d0d0; border-radius: 14px; 
      font-size: 0.95em; background: #fefcfc;
    }
    label { font-weight: bold; display: block; margin-top: 16px; color: #5d4037; }
    .section { 
      background: white; border-radius: 24px; padding: 24px; 
      margin-bottom: 24px; border: 1px solid #f5e8e8;
      box-shadow: 0 4px 12px rgba(160,80,80,0.06);
    }
    .section h2 { 
      font-size: 1.2em; color: #b8404c; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid #f5e8e8;
    }
    .participant-row { 
      display: flex; gap: 10px; margin-bottom: 10px; align-items: center; 
    }
    .participant-row input { flex: 2; margin: 0; }
    .participant-row select { flex: 1.5; margin: 0; }
    .participant-row button { flex: 0.5; margin: 0; background: #888; }
    .hint { font-size: 0.88em; color: #888; margin-top: 6px; }
    .contract-card { 
      background: #fff; border: 1px solid #f0e0e0; 
      border-radius: 20px; padding: 20px; margin-top: 14px; 
    }
    .status-badge { 
      background: #f8e8e8; color: #b8404c; padding: 6px 16px; 
      border-radius: 20px; display: inline-block; 
    }
    hr { border: 0; border-top: 1px solid #f0e0e0; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="subtitle">“婚姻”即议定协议 | 链上合约工具 · 公开版</div>

    <!-- 连接钱包 -->
    <div class="section">
      <h2>🔗 连接钱包</h2>
      <button id="connectBtn">👛 连接浏览器钱包</button>
      <button id="disconnectBtn" style="display:none; background:#888;">断开</button>
      <p id="walletStatus" class="hint">未连接</p>
    </div>

    <!-- 创建合约 -->
    <div class="section">
      <h2>✍️ 创建新合约</h2>
      <label>协议类型</label>
      <select id="contractType">
        <option value="婚姻议定">“婚姻”议定</option>
        <option value="意定监护协议">意定监护协议</option>
        <option value="养老互助协议">养老互助协议</option>
        <option value="自定义协议">自定义协议</option>
      </select>

      <label>参与者信息 (每行一人)</label>
      <div id="participantsContainer">
        <div class="participant-row">
          <input type="text" class="participant-address" placeholder="公钥地址（留空则为自己）">
          <select class="participant-gender">
            <option value="female">女性</option>
            <option value="male">男性</option>
            <option value="other">其他</option>
          </select>
          <button type="button" class="remove-participant-btn" style="display:none; background:#888;">移除</button>
        </div>
      </div>
      <button id="addParticipantBtn" style="background:#6a1b9a;">➕ 添加参与者</button>

      <label style="margin-top:16px;">开始日期 (可选)</label>
      <input type="date" id="startDate">
      <label>结束日期 (必填)</label>
      <input type="date" id="endDate">
      <p id="dateHint" class="hint"></p>

      <label>合约内容</label>
      <input type="text" id="contractText" placeholder="例如：我指定对方为意定监护人...">
      <button id="createBtn">✨ 创建合约</button>
      <div id="createResult" class="hint"></div>
    </div>

    <!-- 签署合约 -->
    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <label>合约地址</label>
      <input type="text" id="signAddr" placeholder="输入已有合约的公钥地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult" class="hint"></div>
    </div>

    <!-- 查询合约 -->
    <div class="section">
      <h2>🔍 查询合约</h2>
      <label>合约地址</label>
      <input type="text" id="queryAddr" placeholder="输入合约公钥地址">
      <button id="queryBtn">查询详情</button>
      <div id="queryResult"></div>
    </div>

    <!-- AI 法律顾问 -->
    <div class="section">
      <h2>🧠 AI 法律顾问</h2>
      <label>法律管辖区</label>
      <select id="lawJurisdiction">
        <option value="china">中国民法</option>
        <option value="california">美国加州家庭法</option>
        <option value="europe">欧洲</option>
        <option value="custom">自定义</option>
      </select>
      <div id="customLawBox" style="display:none;">
        <label>自定义法律背景</label>
        <input type="text" id="customLawContext" placeholder="例如：伊斯兰教法...">
      </div>
      <label>合约条款</label>
      <textarea id="aiText" rows="2" placeholder="粘贴合约条款..."></textarea>
      <label>DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
      <button id="aiBtn">🔍 分析风险</button>
      <div id="aiResult" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    // ---- IDL 和 程序ID ----
    const IDL = {"version": "0.1.0", "name": "nvshu", "instructions": [{"name": "createContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": true}, {"name": "creator", "isMut": true, "isSigner": true}, {"name": "systemProgram", "isMut": false, "isSigner": false}], "args": [{"name": "participantWallets", "type": {"vec": "publicKey"}}, {"name": "genders", "type": {"vec": {"defined": "Gender"}}}, {"name": "contractText", "type": "string"}, {"name": "durationDays", "type": "i64"}]}, {"name": "signContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "signer", "isMut": false, "isSigner": true}], "args": []}, {"name": "annulContract", "accounts": [{"name": "contract", "isMut": true, "isSigner": false}, {"name": "authority", "isMut": false, "isSigner": true}], "args": []}], "accounts": [{"name": "MarriageContract", "type": {"kind": "struct", "fields": [{"name": "creator", "type": "publicKey"}, {"name": "participants", "type": {"vec": {"defined": "Participant"}}}, {"name": "contractText", "type": "string"}, {"name": "createdAt", "type": "i64"}, {"name": "expiresAt", "type": "i64"}, {"name": "status", "type": {"defined": "ContractStatus"}}]}}], "types": [{"name": "Participant", "type": {"kind": "struct", "fields": [{"name": "wallet", "type": "publicKey"}, {"name": "gender", "type": {"defined": "Gender"}}, {"name": "signed", "type": "bool"}]}}, {"name": "Gender", "type": {"kind": "enum", "variants": [{"name": "Female"}, {"name": "Male"}, {"name": "Other"}]}}, {"name": "ContractStatus", "type": {"kind": "enum", "variants": [{"name": "Pending"}, {"name": "Active"}, {"name": "Expired"}, {"name": "Annulled"}]}}], "errors": [{"code": 6000, "name": "NotAParticipant", "msg": "You are not a participant of this contract."}, {"code": 6001, "name": "AlreadySigned", "msg": "You have already signed this contract."}, {"code": 6002, "name": "NotActive", "msg": "Contract is not active."}]};
    const PROGRAM_ID = new solanaWeb3.PublicKey("FuCn9zJcTa3Agq3vAVwknTiJR62Y66bDmPX4GhMMwNSo");
    
    let connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    let provider;
    let program;
    let walletPublicKey;

    // ---- 连接钱包 ----
    document.getElementById('connectBtn').addEventListener('click', async () => {
      if (!window.solana) return alert('请安装 Phantom 或 Solana 钱包');
      try {
        await window.solana.connect();
        walletPublicKey = window.solana.publicKey;
        // 创建 Anchor Provider
        const wallet = {
          publicKey: walletPublicKey,
          signTransaction: async (tx) => {
            return await window.solana.signTransaction(tx);
          },
          signAllTransactions: async (txs) => {
            return await window.solana.signAllTransactions(txs);
          }
        };
        provider = new anchor.AnchorProvider(connection, wallet, {});
        anchor.setProvider(provider);
        program = new anchor.Program(IDL, PROGRAM_ID, provider);
        
        document.getElementById('walletStatus').innerText = '已连接: ' + walletPublicKey.toString().slice(0,8)+'...';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('disconnectBtn').style.display = 'inline-block';
      } catch (e) { alert('连接失败: ' + e.message); }
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      if (window.solana && window.solana.disconnect) window.solana.disconnect();
      walletPublicKey = null;
      provider = null;
      program = null;
      document.getElementById('walletStatus').innerText = '未连接';
      document.getElementById('connectBtn').style.display = 'inline-block';
      document.getElementById('disconnectBtn').style.display = 'none';
    });

    // ---- 动态参与者 ----
    function updateRemoveButtons() {
      const rows = document.querySelectorAll('.participant-row');
      rows.forEach(r => {
        const btn = r.querySelector('.remove-participant-btn');
        if(btn) btn.style.display = rows.length > 1 ? 'inline-block' : 'none';
      });
    }
    document.getElementById('addParticipantBtn').addEventListener('click', () => {
      const container = document.getElementById('participantsContainer');
      const row = document.createElement('div');
      row.className = 'participant-row';
      row.innerHTML = `
        <input type="text" class="participant-address" placeholder="公钥地址">
        <select class="participant-gender">
          <option value="female">女性</option>
          <option value="male">男性</option>
          <option value="other">其他</option>
        </select>
        <button type="button" class="remove-participant-btn" style="background:#888;">移除</button>
      `;
      container.appendChild(row);
      updateRemoveButtons();
      row.querySelector('.remove-participant-btn').addEventListener('click', function() {
        row.remove(); updateRemoveButtons();
      });
    });
    document.querySelectorAll('.remove-participant-btn').forEach(btn => {
      btn.addEventListener('click', function() { btn.closest('.participant-row').remove(); updateRemoveButtons(); });
    });
    updateRemoveButtons();

    // ---- 日期提示 ----
    document.getElementById('endDate').addEventListener('change', function() {
      let s = document.getElementById('startDate').value, e = this.value;
      if(s && e) {
        let days = Math.round((new Date(e+'T00:00:00Z') - new Date(s+'T00:00:00Z'))/86400000);
        document.getElementById('dateHint').innerText = days>0 ? `有效期约 ${days} 天` : '结束日期必须晚于开始日期';
      }
    });

    // ---- 创建合约（Anchor 方法） ----
    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!program) return alert('请先连接钱包');
      const addrInputs = document.querySelectorAll('.participant-address');
      const genderInputs = document.querySelectorAll('.participant-gender');
      let participants = [];
      let genders = [];
      for(let i=0; i<addrInputs.length; i++) {
        let addrStr = addrInputs[i].value.trim();
        if(!addrStr) {
          participants.push(walletPublicKey);
        } else {
          participants.push(new solanaWeb3.PublicKey(addrStr));
        }
        let gv = genderInputs[i].value;
        // Anchor 枚举需要传入 { female: {} } / { male: {} } / { other: {} }
        if(gv === 'female') genders.push({ female: {} });
        else if(gv === 'male') genders.push({ male: {} });
        else genders.push({ other: {} });
      }
      const endDateVal = document.getElementById('endDate').value;
      if(!endDateVal) return alert('请选择结束日期');
      const end = new Date(endDateVal + 'T00:00:00Z');
      const startVal = document.getElementById('startDate').value;
      const start = startVal ? new Date(startVal + 'T00:00:00Z') : new Date();
      let days = Math.round((end - start) / 86400000);
      if(days < 1) return alert('结束日期必须晚于开始日期');
      let text = document.getElementById('contractText').value || "自定义协议";
      if(!text.startsWith('[')) {
        const type = document.getElementById('contractType').value;
        text = `[${type}] ` + text;
      }
      try {
        const contractAccount = anchor.web3.Keypair.generate();
        await program.methods
          .createContract(participants, genders, text, new anchor.BN(days))
          .accounts({
            contract: contractAccount.publicKey,
            creator: walletPublicKey,
            systemProgram: anchor.web3.SystemProgram.programId,
          })
          .signers([contractAccount])
          .rpc();
        document.getElementById('createResult').innerHTML = `✅ 合约已创建！<br><strong>${contractAccount.publicKey.toString()}</strong>`;
      } catch (e) {
        document.getElementById('createResult').innerHTML = `❌ ${e.message}`;
      }
    });

    // ---- 签署合约 ----
    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!program) return alert('请先连接钱包');
      const addr = document.getElementById('signAddr').value.trim();
      if(!addr) return alert('请输入合约地址');
      try {
        await program.methods
          .signContract()
          .accounts({
            contract: new solanaWeb3.PublicKey(addr),
            signer: walletPublicKey,
          })
          .rpc();
        document.getElementById('signResult').innerHTML = '✅ 签署成功';
      } catch (e) {
        document.getElementById('signResult').innerHTML = `❌ ${e.message}`;
      }
    });

    // ---- 查询合约 (Anchor 账户读取) ----
    document.getElementById('queryBtn').addEventListener('click', async () => {
      const addr = document.getElementById('queryAddr').value.trim();
      if(!addr) return;
      try {
        const contract = await program.account.marriageContract.fetch(new solanaWeb3.PublicKey(addr));
        let statusStr = '未知';
        if(contract.status.pending) statusStr = 'Pending';
        else if(contract.status.active) statusStr = 'Active';
        else if(contract.status.expired) statusStr = 'Expired';
        else if(contract.status.annulled) statusStr = 'Annulled';
        let html = `<div class="contract-card">
          <p><strong>发起人：</strong>${contract.creator.toString()}</p>
          <p><strong>内容：</strong>${contract.contractText}</p>
          <p><strong>创建时间：</strong>${new Date(contract.createdAt.toNumber()*1000).toLocaleString()}</p>
          <p><strong>过期时间：</strong>${contract.expiresAt.toNumber() === 0 ? '永久' : new Date(contract.expiresAt.toNumber()*1000).toLocaleString()}</p>
          <p><strong>状态：</strong><span class="status-badge">${statusStr}</span></p>
          <ul>`;
        contract.participants.forEach(p => {
          const gender = p.gender.female ? '女性' : (p.gender.male ? '男性' : '其他');
          html += `<li>${p.wallet.toString()} - ${gender} - ${p.signed ? '已签' : '未签'}</li>`;
        });
        html += '</ul></div>';
        document.getElementById('queryResult').innerHTML = html;
      } catch (e) {
        document.getElementById('queryResult').innerHTML = `❌ ${e.message}`;
      }
    });

    // ---- AI 分析（不变） ----
    document.getElementById('aiBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return alert('请输入 DeepSeek API Key');
      const text = document.getElementById('aiText').value.trim();
      if (!text) return alert('请输入合约条款');
      const resDiv = document.getElementById('aiResult');
      resDiv.innerHTML = '⏳ 分析中...';
      const j = document.getElementById('lawJurisdiction').value;
      let ctx = '你是一位法律顾问。';
      if(j==='china') ctx = '你是一位精通中国民法典的AI法律顾问。';
      else if(j==='california') ctx = '你是一位精通美国加州家庭法的AI法律顾问。';
      else if(j==='europe') ctx = '你是一位精通欧洲人权公约的AI法律顾问。';
      else if(j==='custom') {
        const customCtx = document.getElementById('customLawContext')?.value?.trim();
        if (!customCtx) return alert('请输入自定义法律背景');
        ctx = customCtx;
      }
      try {
        const resp = await fetch('https://api.deepseek.com/chat/completions', {
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
          body: JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:`${ctx} 请分析以下协议条款，用中文给出风险提示。`},{role:'user',content:text}],temperature:0.3})
        });
        if(!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        resDiv.innerHTML = `<div style="white-space:pre-wrap;background:#fff;padding:12px;border-radius:8px;">📋 ${data.choices[0].message.content.replace(/\n/g, '<br>')}</div>`;
      } catch (e) { resDiv.innerHTML = `❌ ${e.message}`; }
    });
    document.getElementById('lawJurisdiction').addEventListener('change', function() {
      document.getElementById('customLawBox').style.display = this.value==='custom' ? 'block' : 'none';
    });
  </script>
</body>
</html>
