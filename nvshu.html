<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>女书 · 公开版</title>
  <script src="https://unpkg.com/@solana/web3.js@1.95.0/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "楷体","KaiTi","微软雅黑",sans-serif; 
      background: #faf5ef; 
      color: #4a3b3c; 
      padding: 30px 20px;
      display: flex; justify-content: center; 
    }
    .container { 
      max-width: 720px; width: 100%; 
      background: rgba(255,255,255,0.9); 
      border-radius: 32px; padding: 40px 32px; 
      box-shadow: 0 8px 32px rgba(180,100,100,0.12); 
    }
    h1 { text-align: center; font-size: 2.6em; color: #b8404c; }
    .title { text-align: center; color: #a05a60; margin-bottom: 36px; }
    button { background: #b8404c; color: white; border: none; padding: 12px 24px; border-radius: 24px; cursor: pointer; font-size: 0.9em; margin: 5px; }
    button:hover { background: #9c3540; }
    input, textarea, select { width: 100%; padding: 12px 14px; margin: 6px 0 12px; border: 1px solid #e8d0d0; border-radius: 14px; background: #fefcfc; }
    label { font-weight: bold; display: block; margin-top: 12px; }
    .section { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    .contract-card { background: white; border: 1px solid #f0e0e0; border-radius: 16px; padding: 20px; margin-top: 12px; }
    .status-badge { background: #f8e8e8; color: #b8404c; padding: 6px 14px; border-radius: 20px; }
    .hint { font-size: 0.85em; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="title">“婚姻”即议定协议 | 公开版</div>

    <div class="section">
      <h2>🔗 连接钱包</h2>
      <button id="connectBtn">👛 连接浏览器钱包</button>
      <button id="disconnectBtn" style="display:none; background:#888;">断开</button>
      <p id="walletStatus" class="hint">未连接</p>
    </div>

    <div class="section">
      <h2>✍️ 创建新合约</h2>
      <label>协议类型</label>
      <select id="contractType">
        <option value="婚姻议定">“婚姻”议定</option>
        <option value="意定监护协议">意定监护协议</option>
        <option value="养老互助协议">养老互助协议</option>
        <option value="自定义协议">自定义协议</option>
      </select>
      <label>参与者地址 (每行一个)</label>
      <textarea id="participants" rows="3" placeholder="公钥地址，留空则为自己"></textarea>
      <label>参与者性别 (每行对应: Female / Male / Other)</label>
      <textarea id="genders" rows="3" placeholder="Female"></textarea>
      <label>开始日期 (可选)</label>
      <input type="date" id="startDate">
      <label>结束日期 (必填)</label>
      <input type="date" id="endDate">
      <label>合约内容</label>
      <input type="text" id="contractText" placeholder="例如：我指定对方为意定监护人...">
      <button id="createBtn">✨ 创建合约</button>
      <div id="createResult" class="hint"></div>
    </div>

    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <input type="text" id="signAddr" placeholder="合约地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult" class="hint"></div>
    </div>

    <div class="section">
      <h2>🔍 查询合约</h2>
      <input type="text" id="queryAddr" placeholder="合约地址">
      <button id="queryBtn">查询详情</button>
      <div id="queryResult"></div>
    </div>

    <div class="section">
      <h2>🧠 AI 法律顾问</h2>
      <select id="lawJurisdiction">
        <option value="china">中国民法</option>
        <option value="california">美国加州家庭法</option>
        <option value="europe">欧洲</option>
        <option value="custom">自定义</option>
      </select>
      <textarea id="aiText" rows="3" placeholder="粘贴合约条款..."></textarea>
      <input type="password" id="apiKey" placeholder="DeepSeek API Key">
      <button id="aiBtn">🔍 分析风险</button>
      <div id="aiResult"></div>
    </div>
  </div>

  <script>
    // ⚠️ 用你真实的 B 开头 Program ID 替换下面这行
    const PROGRAM_ID = new solanaWeb3.PublicKey("YOUR_PROGRAM_ID");
    
    let connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    let walletPublicKey, walletSigner;

    // Anchor 指令判别符
    const DISCRIMINATORS = {
        "create_contract": [171, 143, 141, 157, 62, 226, 23, 108],
        "sign_contract": [140, 56, 178, 216, 89, 123, 211, 156]
    };

    // 连接钱包
    document.getElementById('connectBtn').addEventListener('click', async () => {
      if (!window.solana) return alert('请安装 Phantom 等钱包');
      try {
        await window.solana.connect();
        walletPublicKey = window.solana.publicKey;
        walletSigner = window.solana;
        document.getElementById('walletStatus').innerText = '已连接: ' + walletPublicKey.toString().slice(0,8)+'...';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('disconnectBtn').style.display = 'inline-block';
      } catch (e) { alert('连接失败: ' + e.message); }
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      window.solana.disconnect();
      walletPublicKey = null; walletSigner = null;
      document.getElementById('walletStatus').innerText = '未连接';
      document.getElementById('connectBtn').style.display = 'inline-block';
      document.getElementById('disconnectBtn').style.display = 'none';
    });

    async function sendTransaction(instruction) {
      let tx = new solanaWeb3.Transaction().add(instruction);
      tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
      tx.feePayer = walletPublicKey;
      const signed = await walletSigner.signTransaction(tx);
      let txid = await connection.sendRawTransaction(signed.serialize());
      await connection.confirmTransaction(txid);
      return txid;
    }

    // 创建合约指令
    function buildCreateIx(contractKP, participants, genders, text, days) {
      let data = [...DISCRIMINATORS["create_contract"]];
      // Vec<Pubkey>
      let len = participants.length;
      data.push((len & 0xff), (len>>8)&0xff, (len>>16)&0xff, (len>>24)&0xff);
      participants.forEach(p => data.push(...p.toBytes()));
      // Vec<Gender>
      let gmap = { Female:0, Male:1, Other:2 };
      data.push((len & 0xff), (len>>8)&0xff, (len>>16)&0xff, (len>>24)&0xff);
      genders.forEach(g => data.push(gmap[Object.keys(g)[0]] ?? 2));
      // String
      let encoded = new TextEncoder().encode(text);
      data.push((encoded.length & 0xff), (encoded.length>>8)&0xff, (encoded.length>>16)&0xff, (encoded.length>>24)&0xff);
      data.push(...encoded);
      // i64
      let buf = new ArrayBuffer(8);
      new DataView(buf).setBigInt64(0, BigInt(days), true);
      data.push(...new Uint8Array(buf));
      return new solanaWeb3.TransactionInstruction({
        keys: [
          {pubkey: contractKP.publicKey, isSigner: true, isWritable: true},
          {pubkey: walletPublicKey, isSigner: true, isWritable: true},
          {pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false}
        ],
        programId: PROGRAM_ID,
        data: new Uint8Array(data)
      });
    }

    // 签署合约指令
    function buildSignIx(contractAddr) {
      return new solanaWeb3.TransactionInstruction({
        keys: [
          {pubkey: new solanaWeb3.PublicKey(contractAddr), isSigner: false, isWritable: true},
          {pubkey: walletPublicKey, isSigner: true, isWritable: false}
        ],
        programId: PROGRAM_ID,
        data: new Uint8Array(DISCRIMINATORS["sign_contract"])
      });
    }

    // 创建合约按钮
    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!walletPublicKey) return alert('请先连接钱包');
      let addrLines = document.getElementById('participants').value.split('\n').filter(l => l.trim());
      let genderLines = document.getElementById('genders').value.split('\n').filter(l => l.trim());
      let participants = addrLines.map(a => new solanaWeb3.PublicKey(a.trim()));
      if (participants.length === 0) participants = [walletPublicKey];
      let genders = genderLines.map(g => {
        let v = g.trim().toLowerCase();
        return v === 'male' ? {Male:{}} : (v === 'female' ? {Female:{}} : {Other:{}});
      });
      while (genders.length < participants.length) genders.push({Other:{}});
      let endDate = new Date(document.getElementById('endDate').value);
      let startDate = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : new Date();
      let days = Math.round((endDate - startDate) / 86400000);
      if (days < 1) return alert('结束日期必须晚于开始日期');
      let text = document.getElementById('contractText').value;
      let contractKP = solanaWeb3.Keypair.generate();
      try {
        let ix = buildCreateIx(contractKP, participants, genders, text, days);
        let tx = new solanaWeb3.Transaction().add(ix);
        tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
        tx.feePayer = walletPublicKey;
        tx.partialSign(contractKP);
        const signed = await walletSigner.signTransaction(tx);
        let txid = await connection.sendRawTransaction(signed.serialize());
        await connection.confirmTransaction(txid);
        document.getElementById('createResult').innerHTML = `✅ 合约已创建！<br><strong>${contractKP.publicKey.toString()}</strong>`;
      } catch (e) { document.getElementById('createResult').innerHTML = `❌ ${e.message}`; }
    });

    // 签署合约按钮
    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!walletPublicKey) return alert('请先连接钱包');
      let addr = document.getElementById('signAddr').value.trim();
      if (!addr) return alert('请输入合约地址');
      try {
        let ix = buildSignIx(addr);
        await sendTransaction(ix);
        document.getElementById('signResult').innerHTML = '✅ 签署成功';
      } catch (e) { document.getElementById('signResult').innerHTML = `❌ ${e.message}`; }
    });

    // 查询合约按钮
    document.getElementById('queryBtn').addEventListener('click', async () => {
      let addr = document.getElementById('queryAddr').value.trim();
      if (!addr) return;
      try {
        let info = await connection.getAccountInfo(new solanaWeb3.PublicKey(addr));
        if (!info) throw new Error('账户不存在');
        let data = info.data;
        let creator = new solanaWeb3.PublicKey(data.slice(8,40));
        let off = 40;
        let pLen = data.readUInt32LE(off); off += 4;
        let participants = [];
        for (let i=0; i<pLen; i++) {
          let w = new solanaWeb3.PublicKey(data.slice(off, off+32)); off += 32;
          let g = data.readUInt8(off); off += 1;
          let sig = data.readUInt8(off) === 1; off += 1;
          participants.push({wallet:w.toString(), gender:['Female','Male','Other'][g]||'Other', signed:sig});
        }
        let tLen = data.readUInt32LE(off); off += 4;
        let text = new TextDecoder().decode(data.slice(off, off+tLen)); off += tLen;
        let createdAt = Number(data.readBigInt64LE(off)); off += 8;
        let expiresAt = Number(data.readBigInt64LE(off)); off += 8;
        let status = ['Pending','Active','Expired','Annulled'][data.readUInt8(off)]||'Unknown';
        let html = `<div class="contract-card"><p><strong>发起人：</strong>${creator}</p><p><strong>内容：</strong>${text}</p><p><strong>创建时间：</strong>${new Date(createdAt*1000).toLocaleString()}</p><p><strong>过期时间：</strong>${expiresAt===0?'永久':new Date(expiresAt*1000).toLocaleString()}</p><p><strong>状态：</strong><span class="status-badge">${status}</span></p><ul>`;
        participants.forEach(p => html += `<li>${p.wallet} - ${p.gender} - ${p.signed?'已签':'未签'}</li>`);
        html += '</ul></div>';
        document.getElementById('queryResult').innerHTML = html;
      } catch (e) { document.getElementById('queryResult').innerHTML = `❌ ${e.message}`; }
    });

    // AI 分析按钮
    document.getElementById('aiBtn').addEventListener('click', async () => {
      let apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return alert('请输入 DeepSeek API Key');
      let text = document.getElementById('aiText').value.trim();
      let resDiv = document.getElementById('aiResult');
      resDiv.innerHTML = '⏳ 分析中...';
      let j = document.getElementById('lawJurisdiction').value;
      let ctx = '你是一位法律顾问。';
      if(j==='china') ctx = '你是一位精通中国民法典的AI法律顾问。';
      else if(j==='california') ctx = '你是一位精通美国加州家庭法的AI法律顾问。';
      else if(j==='europe') ctx = '你是一位精通欧洲人权公约的AI法律顾问。';
      else if(j==='custom') ctx = document.getElementById('customLawContext')?.value?.trim() || ctx;
      try {
        let resp = await fetch('https://api.deepseek.com/chat/completions', {
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
          body: JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:`${ctx} 请分析以下协议条款，用中文给出风险提示。`},{role:'user',content:text}],temperature:0.3})
        });
        if(!resp.ok) throw new Error(`API ${resp.status}`);
        let data = await resp.json();
        resDiv.innerHTML = `<div style="white-space:pre-wrap;background:#fff;padding:12px;border-radius:8px;">📋 ${data.choices[0].message.content.replace(/\n/g, '<br>')}</div>`;
      } catch (e) { resDiv.innerHTML = `❌ ${e.message}`; }
    });
  </script>
</body>
</html>
