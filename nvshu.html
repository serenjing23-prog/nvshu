<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>女书 · 公开版</title>
  <script>
    if (typeof Buffer === "undefined") {
      class Buffer {
        static from(arr) {
          if (typeof arr === "string") return new TextEncoder().encode(arr);
          if (arr instanceof Uint8Array) return arr;
          return new Uint8Array(arr);
        }
      }
      window.Buffer = Buffer;
    }
  </script>
  <script src="https://unpkg.com/@solana/web3.js@1.95.0/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/@project-serum/anchor@latest/dist/browser/index.js"></script>
  <style>
    body { font-family: "楷体","KaiTi","微软雅黑",sans-serif; background: #faf5ef; margin:0; padding:20px; }
    .container { max-width:800px; margin:0 auto; background: rgba(255,255,255,0.9); border-radius:20px; padding:30px; }
    h1 { text-align:center; color:#b3444c; }
    h1::before, h1::after { content:"𛆉"; font-size:0.6em; color:#c77d7d; opacity:0.7; }
    h1::after { content:"𛆊"; }
    button { background:#b3444c; color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin:5px; }
    input,textarea,select { width:100%; padding:8px; margin:5px 0 15px; border:1px solid #d4a5a5; border-radius:5px; }
    .section { margin:20px 0; padding:20px; background:rgba(255,245,240,0.7); border-radius:10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📜 女书</h1>
    <div class="title" style="text-align:center; color:#9e5a5e; margin-bottom:30px;">“婚姻”即议定协议 | 公开版</div>

    <div class="section">
      <h2>🔗 连接钱包</h2>
      <button id="connectBtn">👛 连接浏览器钱包</button>
      <button id="disconnectBtn" style="display:none; background:#888;">断开</button>
      <p id="walletStatus">未连接</p>
    </div>

    <div class="section">
      <h2>✍️ 创建新合约</h2>
      <label>协议类型</label>
      <select id="contractType">
        <option value="婚姻议定">“婚姻”议定</option>
        <option value="意定监护协议">意定监护协议</option>
        <option value="养老互助协议">养老互助协议</option>
        <option value="自定义协议">自定义协议</option>
      </select>
      <label>参与者地址 (每行一个)</label>
      <textarea id="participants" rows="3" placeholder="公钥地址，留空则为自己"></textarea>
      <label>参与者性别 (每行对应: Female/Male/Other)</label>
      <textarea id="genders" rows="3" placeholder="Female"></textarea>
      <label>开始日期 (可选)</label>
      <input type="date" id="startDate">
      <label>结束日期 (必填)</label>
      <input type="date" id="endDate">
      <label>合约内容</label>
      <input type="text" id="contractText" placeholder="例如：我指定对方为意定监护人...">
      <button id="createBtn">✨ 创建合约</button>
      <div id="createResult"></div>
    </div>

    <div class="section">
      <h2>🖊️ 签署合约</h2>
      <input type="text" id="signAddr" placeholder="合约地址">
      <button id="signBtn">签署这份合约</button>
      <div id="signResult"></div>
    </div>

    <div class="section">
      <h2>🔍 查询合约</h2>
      <input type="text" id="queryAddr" placeholder="合约地址">
      <button id="queryBtn">查询详情</button>
      <div id="queryResult"></div>
    </div>

    <div class="section">
      <h2>🧠 AI 法律顾问</h2>
      <select id="lawJurisdiction">
        <option value="china">中国民法</option>
        <option value="california">美国加州家庭法</option>
        <option value="europe">欧洲</option>
        <option value="custom">自定义</option>
      </select>
      <textarea id="aiText" rows="3" placeholder="粘贴合约条款..."></textarea>
      <input type="password" id="apiKey" placeholder="DeepSeek API Key">
      <button id="aiBtn">🔍 分析风险</button>
      <div id="aiResult"></div>
    </div>
  </div>

  <script>
    const PROGRAM_ID = new solanaWeb3.PublicKey("FuCn9zJcTa3Agq3vAVwknTiJR62Y66bDmPX4GhMMwNSo");
    const IDL = {"version":"0.1.0","name":"nvshu","instructions":[{"name":"createContract","accounts":[{"name":"contract","isMut":true,"isSigner":true},{"name":"creator","isMut":true,"isSigner":true},{"name":"systemProgram","isMut":false,"isSigner":false}],"args":[{"name":"participantWallets","type":{"vec":"publicKey"}},{"name":"genders","type":{"vec":{"defined":"Gender"}}},{"name":"contractText","type":"string"},{"name":"durationDays","type":"i64"}]},{"name":"signContract","accounts":[{"name":"contract","isMut":true,"isSigner":false},{"name":"signer","isMut":false,"isSigner":true}],"args":[]},{"name":"annulContract","accounts":[{"name":"contract","isMut":true,"isSigner":false},{"name":"authority","isMut":false,"isSigner":true}],"args":[]}],"accounts":[{"name":"MarriageContract","type":{"kind":"struct","fields":[{"name":"creator","type":"publicKey"},{"name":"participants","type":{"vec":{"defined":"Participant"}}},{"name":"contractText","type":"string"},{"name":"createdAt","type":"i64"},{"name":"expiresAt","type":"i64"},{"name":"status","type":{"defined":"ContractStatus"}}]}}],"types":[{"name":"Participant","type":{"kind":"struct","fields":[{"name":"wallet","type":"publicKey"},{"name":"gender","type":{"defined":"Gender"}},{"name":"signed","type":"bool"}]}},{"name":"Gender","type":{"kind":"enum","variants":[{"name":"Female"},{"name":"Male"},{"name":"Other"}]}},{"name":"ContractStatus","type":{"kind":"enum","variants":[{"name":"Pending"},{"name":"Active"},{"name":"Expired"},{"name":"Annulled"}]}}],"errors":[{"code":6000,"name":"NotAParticipant","msg":"You are not a participant of this contract."},{"code":6001,"name":"AlreadySigned","msg":"You have already signed this contract."},{"code":6002,"name":"NotActive","msg":"Contract is not active."}]};

    let connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    let wallet, provider, program;

    document.getElementById('connectBtn').addEventListener('click', async () => {
      if (!window.solana) return alert('请安装 Phantom 或 Backpack 钱包');
      await window.solana.connect();
      const pubKey = window.solana.publicKey;
      wallet = window.solana;
      provider = new anchor.AnchorProvider(connection, wallet, anchor.AnchorProvider.defaultOptions());
      anchor.setProvider(provider);
      program = new anchor.Program(IDL, PROGRAM_ID, provider);
      document.getElementById('walletStatus').innerText = '已连接: '+pubKey.toString().slice(0,8)+'...';
      document.getElementById('connectBtn').style.display='none';
      document.getElementById('disconnectBtn').style.display='inline-block';
    });

    document.getElementById('disconnectBtn').addEventListener('click', async () => {
      await wallet.disconnect();
      wallet = null; provider = null; program = null;
      document.getElementById('walletStatus').innerText = '未连接';
      document.getElementById('connectBtn').style.display='inline-block';
      document.getElementById('disconnectBtn').style.display='none';
    });

    document.getElementById('createBtn').addEventListener('click', async () => {
      if (!program) return alert('请先连接钱包');
      let addrLines = document.getElementById('participants').value.split('\n').filter(l=>l.trim());
      let genderLines = document.getElementById('genders').value.split('\n').filter(l=>l.trim());
      let participants = addrLines.map(a=>new solanaWeb3.PublicKey(a.trim()));
      if (!participants.length) participants = [wallet.publicKey];
      let genders = genderLines.map(g=>{
        let v = g.trim().toLowerCase();
        if(v==='female') return {female:{}};
        if(v==='male') return {male:{}};
        return {other:{}};
      });
      while(genders.length < participants.length) genders.push({other:{}});
      let endDate = new Date(document.getElementById('endDate').value);
      let startDate = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : new Date();
      let days = Math.round((endDate-startDate)/86400000);
      if(days<1) return alert('结束日期必须晚于开始日期');
      let text = document.getElementById('contractText').value;
      if(!text.startsWith('[')) text = `[${document.getElementById('contractType').value}] ` + text;
      let contractKP = solanaWeb3.Keypair.generate();
      try {
        await program.methods.createContract(participants, genders, text, new anchor.BN(days))
          .accounts({ contract: contractKP.publicKey, creator: wallet.publicKey, systemProgram: solanaWeb3.SystemProgram.programId })
          .signers([contractKP])
          .rpc();
        document.getElementById('createResult').innerHTML = `✅ 合约已创建！<br><strong>${contractKP.publicKey.toString()}</strong>`;
      } catch(e) { document.getElementById('createResult').innerHTML = `❌ ${e.message}`; }
    });

    document.getElementById('signBtn').addEventListener('click', async () => {
      if (!program) return alert('请先连接钱包');
      let addr = document.getElementById('signAddr').value.trim();
      if(!addr) return alert('请输入合约地址');
      try {
        await program.methods.signContract()
          .accounts({ contract: new solanaWeb3.PublicKey(addr), signer: wallet.publicKey })
          .rpc();
        document.getElementById('signResult').innerHTML = '✅ 签署成功';
      } catch(e) { document.getElementById('signResult').innerHTML = `❌ ${e.message}`; }
    });

    document.getElementById('queryBtn').addEventListener('click', async () => {
      let addr = document.getElementById('queryAddr').value.trim();
      if(!addr) return;
      try {
        let c = await program.account.marriageContract.fetch(new solanaWeb3.PublicKey(addr));
        let html = `<div><p>发起人：${c.creator}</p><p>内容：${c.contractText}</p><p>状态：${Object.keys(c.status)[0]}</p><p>参与者：</p><ul>`;
        c.participants.forEach(p=>{ html += `<li>${p.wallet} - ${Object.keys(p.gender)[0]} - ${p.signed?'已签':'未签'}</li>`; });
        html += '</ul></div>';
        document.getElementById('queryResult').innerHTML = html;
      } catch(e) { document.getElementById('queryResult').innerHTML = '❌ 查询失败'; }
    });

    document.getElementById('aiBtn').addEventListener('click', async () => {
      let apiKey = document.getElementById('apiKey').value.trim();
      let text = document.getElementById('aiText').value.trim();
      if(!apiKey||!text) return alert('请输入API Key和合约条款');
      let j = document.getElementById('lawJurisdiction').value;
      let ctx = j==='china'?'中国民法典':j==='california'?'美国加州家庭法':j==='europe'?'欧洲人权公约':'';
      let prompt = `你是一位精通${ctx}的法律顾问，请分析以下条款风险：`;
      try {
        let r = await fetch('https://api.deepseek.com/chat/completions', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
          body: JSON.stringify({model:'deepseek-chat', messages:[{role:'system',content:prompt},{role:'user',content:text}], temperature:0.3})
        });
        if(!r.ok) throw new Error('API错误');
        let d = await r.json();
        document.getElementById('aiResult').innerHTML = `<div style="white-space:pre-wrap;">📋 ${d.choices[0].message.content}</div>`;
      } catch(e) { document.getElementById('aiResult').innerHTML = '❌ 分析失败'; }
    });
  </script>
</body>
</html>
